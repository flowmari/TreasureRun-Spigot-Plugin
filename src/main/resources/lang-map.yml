# lang-map.yml — Single Source of Truth for language mapping
#
# To add a new language (e.g. Welsh "cy"):
#   1. Add one line here:              cy: cy_gb
#   2. Add cy.yml to languages/        (copy from en.yml, translate)
#   3. Add cy_gb.json to:
#      - resourcepacks/treasurerun-i18n-pack/assets/minecraft/lang/
#      - fabric-i18n-mod/src/main/resources/assets/minecraft/lang/
#   4. git push → CI validates everything automatically.
#      NO Java code change. NO script change. Ever.
#
# Format:  <TreasureRun lang code>: <Minecraft locale code>
#
mappings:
  ja:        ja_jp
  en:        en_us
  de:        de_de
  fr:        fr_fr
  es:        es_es
  it:        it_it
  ko:        ko_kr
  ru:        ru_ru
  zh_tw:     zh_tw
  pt:        pt_br
  nl:        nl_nl
  fi:        fi_fi
  sv:        sv_se
  is:        is_is
  la:        la_la
  hi:        hi_in
  sa:        sa_in
  lzh:       lzh_hant
  ojp:       ojp_jp
  asl_gloss: asl_us
