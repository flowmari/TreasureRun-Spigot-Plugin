      - 波は静まり、海は隠せし深淵をふたたび己がものとせり。
      - 待つ宝もあり。次は、別なる道へ。
      - 天は変はらず。変はりしは、汝なり。
      - 刹那は過ぎぬ。されど、整ひは残れり。
      - 冬は正直なり。汝の走りもまた然り。
