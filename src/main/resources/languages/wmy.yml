      - 息を整へ給へ。いま一度。
      - こたびはここまで。次なる一歩へ進み給へ。
      - 汝はなほ、ここにあり。それこそ大事なり。
      - 走りは止まりぬ。されど、汝は止まらず。
      - 時は止まりぬ。されど、汝はまだ止まらず。
      - 御掟は変はらず。いま一度。
      - 惜しきこと、まことなり。
      - 日は入り、影はふたたび世を覆ひぬ。
