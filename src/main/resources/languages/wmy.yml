# ============================================================
# TreasureRun language file: WMY / Classical Japanese style
# 言語コード: wmy
#
# 20th language for TreasureRun i18n.
# Based on ja.yml and rewritten toward readable classical Japanese.
#
# Design policy:
# - Same key structure as ja.yml.
# - No Java hardcoding.
# - Player is translated as 仕手.
# - All 158 outcome proverb/quote pool entries remain present.
# - Minecraft UI remains readable.
# ============================================================

outcome:
  fallback:
    runComplete: "成し遂げたり。"
    timeUp: "時尽きたり。"
    trader: "交換が終はりぬ。"
  notice:
    timeUpGameOver: '時尽きたり。遊戯オーバーなり。'
    retryGuide: '別のルートでいま一度挑みしてみてし給へ。'
  success:
    common:
      pool: []
    easy:
      pool:
      - たどり着きぬ。まことは、まことのままに。
      - 小さき一歩なれど、汝は守り果てたり。
      - 耳を澄ませば、道おのづから開けたり。
      - '汝は辿り着いた。


        御掟は単純なりき。


        選びしは、汝自身。'
      - '隔たりが意味になり、


        時が汝の足取りに応えた。'
      - 'すべてがとこしへに輝くにはあらず。


        されど、この刹那はさなりき。'
      - 光が等しく降り注ぎ、すべての影が消えた。
      - 風が止み、あるべき場所に、あるべきものが戻った。
      - 一瞬のしじま。世がその呼吸を整えた。
      - 記しは砂に深く刻まれ、風もそれを動かせない。
      - 調べが訪れた。すべては、この刹那のためにあった。
      - 時は静かに流れ、記憶の隅に収まった。
      - 天の色が変わり、一つの物語が完結を告げた。
      - 波は穏やかになり、海は再びその深淵を隠した。
      - 歩みは止まり、場所だけがそこに残された。
      - 勝ちも負けも、同じ砂の一粒に過ぎず。
      - 道は続き、あるいは途切る。いづれも同じ大地の上にあり。
    normal:
      pool:
      - 隔たりが意味になった。時が汝の歩みに答えた。
      - 時は終わった。ほかは終わっていない。
      - 軸(中心)は見出された。世はその運動を止めた。
      - ガラスは割れなかった。汝も折れなかった。
      - 静かな天の下で、意志は持ちこたえた。
      - とこしへに輝くものなんてほとんどないけれど、この刹那は別格だった。
      - 脆い地面を渡り切った。地平線景色をしっかりと握りしめたまま。
      - 刹那は過ぎ去った。遺されたもの記し・功績は残る。
      - 運は速やかに消え、整い秩序は永続する。
      - 天はその終わりなき循環に休止を知らぬ。汝もまた、止まらず。
      - 中心は到達された。世は立ち尽くし静止した。
      - ついに、ここへ辿り着いた。まことは屈することなく、そこに在る。
      - 完遂。この道を選んだのは他でもない汝だ。
      - 時はしじまへと漂い、精神の奥底の隅に自らの居場所を見出だしぬ。
      - 天が姿を変えるとともに、一つの物語はその最終的な完結を見出した。
      - 波は静まり、天は再びその深淵を覆い隠した。
      - 歩みは途絶え、ただ場所だけがそこに在り続けた。
      - 光が等しく降り注ぎ、すべての影が消えた。
      - 風が止み、あるべき場所に、あるべきものが戻った。
      - 一瞬のしじま。世がその呼吸を整えた。
      - 記しは砂に深く刻まれ、風もそれを動かせない。
      - 調べが訪れた。すべては、この刹那のためにあった。
      - 成就。見出だしぬ。それにて足れり。
      - 道は持ちこたへたり。汝もまた然り。
      - 天はずっと歩み続けていた。汝も進み続けられる。
      - 静かな果て。本物の積み重ね。
      - 世が用意していた道を、汝は歩いただけ。
      - 大地は壊れなかった。汝の足取りを、信じていた。
      - この刹那は、星々の長いリズムと重なった。
      - 何かを奪ったわけじゃない。何かを、理解した。
      - 手に入れたのは何かではない。まことを、見抜いただけだ。
      - 征服せしにあらず。ここに属していたり。
      - 記憶より古い道を、汝は辿った。
      - 大地は抗わず、汝を認識した。
      - この刹那は、星々の静けさと重なった。
    hard:
      pool:
      - 北風の中にて、速さより明晰さぞ生き残る。
      - 軸(中心)は見出された。世はその運動を止めた。
      - 星は黙っている。語るのは汝の記しだ。
      - 果ては残った。ありかは変わった。
      - 氷とガラスのあいだで、汝は制御を選んだ。
      - 波は静まり、海はその隠された深淵を再び自らのものとした。
      - 待つ宝もある。次は、別の道を。
      - 天は変わらなかった。変わったのは汝。
      - 刹那は過ぎた。整いは残った。
      - 冬は正直だ。汝の走りもそうだった。
      - 星は束の間そろった。汝はそれに気づいた。
      - 隔たりは縮んでいた。時は縮まらなかった。
      - 世の御掟は、厳然としてそこにあった。可能性（信号）は本物だった。
      - 道は静かに閉じた。汝はもう抜けていた。
      - 何も変わらない。ただ、汝のありかだけが変わった。
      - 運にあらず。整ひなり。
      - 刹那は過ぎぬ。記しは残れり。
      - 果てに違いはなかった。それでも、汝は前に進んだ。
      - 出力は変わらないままだが、汝は新しいレベルに到達した。
      - 結末は同じだが、そこに辿り着いた人間は変わった。
      - 目的地は同じだが、汝はもう以前と同じ旅人ではない。
      - 光が等しく降り注ぎ、すべての影が消えた。
      - 風が止み、あるべき場所に、あるべきものが戻った。
      - 一瞬のしじま。世がその呼吸を整えた。
      - 記しは砂に深く刻まれ、風もそれを動かせない。
      - 調べが訪れた。すべては、この刹那のためにあった。
      - 時は静かに流れ、記憶の隅に収まった。
      - 天の色が変わり、一つの物語が完結を告げた。
      - 波は穏やかになり、海は再びその深淵を隠した。
      - 歩みは止まり、場所だけがそこに残された。
      - 勝ちも負けも、同じ砂の一粒に過ぎず。
      - 道は続き、あるいは途切る。いづれも同じ大地の上にあり。
  timeup:
    easy:
      pool:
      - 時は終わった。ほかは終わっていない。
      - 宝は待てり。汝もまた、待つことを知る。
      - 息をして。いま一度。
      - 此度はここまで。次なる一歩へ。
      - いまだここに在り。それこそ大事なり。
      - 走りは止まりぬ。されど汝は止まらず。
      - 時は止まった。でも、汝は止まっていない。
      - 御掟は変わらない。いま一度。
      - 惜しきこと、まことなり。
      - 日は入り、影ふたたび世を覆ひぬ。
      - 砂はことごとく落ち、物語は静かに幕を閉ぢぬ。
      - 風吹き抜け、足跡は跡形もなく消えぬ。
      - 潮満ちぬ。かつてそこにありしものは、海へ還りたり。
      - 沈黙。ただ時のみ、そこを過ぎ行きぬ。
      - 勝ちも負けも、同じ砂の一粒に過ぎず。
      - 道は続き、あるいは途切る。いづれも同じ大地の上にあり。
    normal:
      pool:
      - 隔たりは縮んだ。時は縮まらなかった。
      - 世は御掟を守った。汝は境界に触れた。
      - 届かざりき。されど合図はまことなり。
      - 待つ宝もあり。別の道を試み給へ。
      - 果ては残った。ありかは変わった。
      - 時は終わった。意味は終わっていない。
      - 惜しかりき。音もまた、さう告げたり。
      - 地図は開きたりまま。戻っておいで。
      - 世の御掟は厳然としてそこにあった。可能性（信号）は本物だった。
      - 世は御掟を守った。
      - 刹那は過ぎぬ。記しは残れり。
      - 日は入り、影ふたたび世を覆ひぬ。
      - 砂はことごとく落ち、物語は静かに幕を閉ぢぬ。
      - 風吹き抜け、足跡は跡形もなく消えぬ。
      - 潮満ちぬ。かつてそこにありしものは、海へ還りたり。
      - 沈黙。ただ時のみ、そこを過ぎ行きぬ。
      - 勝ちも負けも、同じ砂の一粒に過ぎず。
      - 道は続き、あるいは途切る。いづれも同じ大地の上にあり。
      - '時は終わった。


        それ以外は、終わっていない。'
      - '果ては変わらなかった。


        でも、汝のありかは変わった。'
    hard:
      pool:
      - 極光すら消ゆ。新しき歩みにて戻り給へ。
      - 脆い世では、焦りが明晰さの発見を壊してしまう。
      - 逃したのは刹那。意味ではない。
      - 冬は忍耐強い。汝もそうであれ。
      - 天は進み続けた。汝も進む。
      - 叙事は頁をめくる。これは終はりにあらず。
      - 星は見守っていた。いま一度。
      - 氷は急がない。汝も急ぐ必要はない。
      - 天は動き続けた。汝も動き続けられる。
      - 北は『待つこと』を覚えたり。そこより学び給へ。
      - これは休止なり。終はりにはあらず。
      - 雲が動き続けるように。川のように、流れを失わないで。
      - 音は近かった。隔たりは本物だった。でも、その刹那は記し置きできない。
      - 近づいていた。時だけが近づかなかった。
      - 世は御掟を守った。汝はその縁に触れた。
      - 宝には届かざりき。されど合図はまことなり。
      - 何も変わらない。ただ、汝のありかだけが変わった。
      - 運にあらず。整ひなり。
      - 刹那は過ぎぬ。記しは残れり。
      - 脆い地面を渡った。視界（景色）を壊さずに。
      - '何も変わらない。ただ、汝のありかだけが変わった。

        運にあらず。整ひなり。

        刹那は過ぎぬ。記しは残れり。'
      - 日は入り、影ふたたび世を覆ひぬ。
      - 砂はことごとく落ち、物語は静かに幕を閉ぢぬ。
      - 風吹き抜け、足跡は跡形もなく消えぬ。
      - 潮満ちぬ。かつてそこにありしものは、海へ還りたり。
      - 沈黙。ただ時のみ、そこを過ぎ行きぬ。
      - 勝ちも負けも、同じ砂の一粒に過ぎず。
      - 道は続き、あるいは途切る。いづれも同じ大地の上にあり。
      - 季節は閉ぢぬ。大地は、なほ残れり。
      - 道は、まだそこにある。汝が歩みを止めただけ。
      - 汝の時は終わった。天は、終わっていない。
      - 拒みにあらず。ただ、沈黙なりき。
      - 世は形を保っている。変わった汝で、戻れる。
      - 季節は終はりぬ。森は、なほ残れり。
      - 隔たりは縮んでいた。時は、リズムを保った。
      - 汝の時は止まった。天は、止まらなかった。
      - 拒みにあらず。ただの沈黙。
      - 道は、まだここにある。違う汝で、戻れる。

