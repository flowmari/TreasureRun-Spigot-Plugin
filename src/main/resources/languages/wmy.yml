outcome:
  fallback:
    runComplete: 成し遂げ給ひぬ。
    timeUp: 時、尽きにけり。
    trader: 交易、すでに果てにけり。
  notice:
    timeUpGameOver: 時、尽きにけり。遊びはここに果てぬ。
    retryGuide: 別なる道を取り、いま一度挑み給へ。
  success:
    common:
      pool: []
    easy:
      pool:
      - たどり着き給ひぬ。まことは、まことのままにあり。
      - 小さき一歩なれど、汝はよく守り果て給ひぬ。
      - 耳を澄ませば、道はおのづから開けにけり。
      - 汝、つひに辿り着き給ひぬ。\n\n御掟はただ一つなり。\n\n選びしは、ほかならぬ汝なり。
      - 隔たりはしるしとなり、\n\n時は汝の足取りに応へにけり。
      - すべてのもの、とこしへに輝くにはあらず。\n\nされど、この刹那ばかりは、まこと輝きたり。
      - 光あまねく降りそそぎ、影はことごとく消えにけり。
      - 風やみて、あるべきものは、あるべき所へ帰りぬ。
      - 一瞬のしじま。世は静かに息を整へたり。
      - 記しは砂に深く刻まれ、風もこれを動かし得ず。
      - 調べは訪れぬ。すべては、この刹那のためにありき。
      - 時は静かに流れ、記憶の隅に収まりぬ。
      - 天の色あらたまり、一つの物語は結びを告げぬ。
      - 波は穏やかになり、海はふたたび深き底を隠しぬ。
      - 歩みは止まり、ただその場所のみ残りたり。
      - 勝ちも負けも、同じ砂の一粒に過ぎず。
      - 道は続き、または途切る。いづれも同じ大地の上にあり。
    normal:
      pool:
      - 隔たりはしるしとなり、時は汝の歩みに応へたり。
      - 時は果てぬ。されど、ほかはまだ果てず。
      - 軸は見出だされぬ。世はそのめぐりを止めたり。
      - 硝子は砕けず。汝もまた、折れざりき。
      - 静かなる天の下、志はよく持ちこたへたり。
      - とこしへに輝くものは多からず。されど、この刹那は別なりき。
      - 脆き地を渡り果て、汝は地平の景を手放さざりき。
      - 刹那は過ぎぬ。されど記しと功は残りたり。
      - 運はたちまち消ゆ。されど整ひは長く残るものなり。
      - 天はめぐりを休まず。汝もまた、止まることなかれ。
      - 中心に至りぬ。世は立ち尽くし、静まりたり。
      - つひに、ここへ至り給ひぬ。まことは屈せず、そこにあり。
      - 完遂せり。この道を選びしは、ほかならぬ汝なり。
      - 時はしじまへ漂ひ、心の奥にその居所を得たり。
      - 天、姿を変へ、一つの物語はここに結びを得たり。
      - 波は静まり、天はふたたび深きものを覆ひ隠しぬ。
      - 歩みは途絶え、ただ場所のみ、そこにあり続けたり。
      - 光あまねく降りそそぎ、影はことごとく消えにけり。
      - 風やみて、あるべきものは、あるべき所へ帰りぬ。
      - 一瞬のしじま。世は静かに息を整へたり。
      - 記しは砂に深く刻まれ、風もこれを動かし得ず。
      - 調べは訪れぬ。すべては、この刹那のためにありき。
      - 成就せり。見出だし給ひぬ。それにて足れり。
      - 道は持ちこたへたり。汝もまた、然り。
      - 天は歩みをやめざりき。汝もまた、進み続け給へ。
      - 静かなる果て。まことの積み重ねなり。
      - 世の備へし道を、汝はただ歩み給ひぬ。
      - 大地は崩れず。汝の足取りを、信じたり。
      - この刹那、星々の長き調べと重なりぬ。
      - 何かを奪ひしにはあらず。ただ、何かを悟り給ひぬ。
      - 手に入れしは物にあらず。まことを見抜き給ひしのみ。
      - 征服せしにあらず。汝は、もとよりここに属し給ひき。
      - 記憶よりも古き道を、汝は辿り給ひぬ。
      - 大地は抗はず、汝を認めたり。
      - この刹那、星々の静けさと重なりぬ。
    hard:
      pool:
      - 北風の中にては、速さよりも明らけき心こそ残る。
      - 軸は見出だされぬ。世はそのめぐりを止めたり。
      - 星は黙せり。語るは、汝の記しのみ。
      - 果ては残れり。されど、ありかは移りぬ。
