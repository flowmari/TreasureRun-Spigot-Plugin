outcome:
  notice:
    timeUpGameOver: Il tempo è scaduto. Partita finita.
    retryGuide: Riprova seguendo un percorso diverso.
  success:
    common:
      pool: []
    easy:
      pool:
      - 'Ce l’hai fatta.

        La verità resta.'
      - 'Anche se era solo un piccolo passo,

        hai tenuto saldo il terreno sotto di te.'
      - 'Hai ascoltato.

        E il sentiero si è aperto.'
      - '> Sei arrivato fin qui.

        >

        > Le regole erano semplici —

        >

        > la scelta era tua.'
      - '> La distanza ha preso significato.

        >

        > E il tempo ha risposto ai tuoi passi.'
      - '> Non tutto ciò che brilla dura per sempre.

        >

        > Ma questo istante ha brillato.'
      - 'La luce è scesa piano,

        e ogni ombra si è ritirata.'
      - 'Il vento si è placato.

        Ogni cosa è tornata al suo posto.'
      - 'Un istante di silenzio.

        Il mondo ha ripreso fiato.'
      - 'La traccia si è incisa nella sabbia —

        là dove il vento non arriva più.'
      - 'L’equilibrio è tornato.

        Tutto portava a questo istante.'
      - 'Il tempo è scivolato via in silenzio,

        al riparo in un angolo della memoria.'
      - 'Il cielo ha cambiato colore,

        e una storia si è chiusa.'
      - 'Le onde si sono calmate,

        e il mare ha custodito di nuovo le sue profondità.'
      - 'I passi si sono fermati,

        e solo il luogo è rimasto.'
      - 'Vittoria e sconfitta —

        in fondo, non sono che granelli di sabbia.'
      - 'La strada continua — oppure finisce qui.

        In entrambi i casi, poggia sulla stessa terra.'
    normal:
      pool:
      - 'La distanza ha finalmente trovato il suo senso.

        Il tempo ha risposto al tuo viaggio.'
      - 'Il tempo è scaduto.

        Ma non tutto è finito.'
      - 'L’asse è stato trovato.

        Il mondo ha sospeso il suo moto.'
      - 'Il vetro ha trattenuto il respiro,

        e tu hai tenuto duro.'
      - 'Sotto il cielo immobile,

        il tuo spirito non ha vacillato.'
      - 'Poche cose brillano per sempre.

        Ma questo istante ha brillato.'
      - 'Hai attraversato una terra fragile

        senza perdere di vista l’orizzonte.'
      - 'L’istante è passato.

        Ciò che resta, resta.'
      - 'La fortuna svanisce in fretta.

        L’ordine rimane.'
      - 'Il cielo non conosce pause nel suo cerchio infinito,

        e nemmeno tu ti sei fermato.'
      - 'Hai raggiunto il centro.

        Il mondo si è fermato.'
      - 'Finalmente sei qui.

        La verità resta salda.'
      - 'Sei arrivato fino in fondo.

        Ricordalo: questa strada l’hai scelta tu, nessun altro.'
      - 'Il tempo è scivolato nel silenzio

        e ha trovato posto nel fondo della memoria.'
      - 'Mentre il cielo cambiava colore,

        la storia ha trovato la sua fine.'
      - 'Le acque si sono calmate,

        e il cielo ha velato di nuovo l’abisso.'
      - 'I passi si sono spenti,

        e solo il luogo è rimasto.'
      - 'La luce è scesa piano,

        e ogni ombra si è ritirata.'
      - 'Il vento si è placato.

        Ogni cosa è tornata al suo posto.'
      - 'Un istante di silenzio.

        Il mondo ha ripreso fiato.'
      - 'La traccia si è incisa nella sabbia —

        là dove il vento non arriva più.'
      - 'L’equilibrio è tornato.

        Tutto portava a questo istante.'
      - 'Corsa completata.

        Chiaro. Trovato.

        Basta così.'
      - 'Corsa completata.

        Il sentiero ha retto.

        Anche tu.'
      - 'Il cielo ha continuato il suo corso.

        Puoi farlo anche tu.'
      - 'Corsa completata.

        Un risultato quieto.

        Il peso del lavoro vero.'
      - 'Hai solo seguito il sentiero

        che il mondo aveva tracciato davanti a te.'
      - 'La terra non ha ceduto.

        Si è fidata dei tuoi passi.'
      - 'Questo istante si è accordato

        al ritmo antico delle stelle.'
      - 'Non hai preso nulla.

        Hai capito qualcosa.'
      - 'Non hai guadagnato nulla per te.

        Hai solo visto la verità per ciò che era.'
      - 'Non hai conquistato questo luogo.

        Ne facevi parte.'
      - 'Hai percorso una via

        più antica della memoria stessa.'
      - 'La terra non ha opposto resistenza.

        Ti ha riconosciuto.'
      - 'Questo istante si è accordato

        al silenzio delle stelle.'
    hard:
      pool:
      - 'Nel vento del nord,

        la chiarezza dura più della velocità.'
      - 'Il centro è stato trovato.

        Il mondo ha potuto quietarsi.'
      - 'Le stelle tacciono.

        La tua traccia parla per te.'
      - 'Il risultato ha retto.

        La posizione è cambiata.'
      - 'Tra ghiaccio e vetro,

        hai scelto il controllo.'
      - 'Le onde si sono spente,

        e il mare ha ripreso le sue profondità segrete.'
      - 'Altri tesori aspettano ancora.

        La prossima volta, un altro sentiero.'
      - 'Il cielo non è cambiato.

        Tu sì.'
      - 'L’istante è passato.

        È rimasto solo l’ordine.'
      - 'L’inverno è onesto.

        Lo è stata anche la tua corsa.'
      - 'Le stelle si sono allineate per un istante.

        Tu te ne sei accorto.'
      - 'La distanza si è chiusa.

        Il tempo no.'
      - 'Le regole del mondo sono rimaste salde.

        E il segno del possibile era reale.'
      - 'Il sentiero si è richiuso in silenzio.

        Tu lo avevi già attraversato.'
      - 'Hai trovato abbastanza.

        Il resto può aspettare.'
      - 'Non hai ottenuto tutto.

        Ma nulla è andato perduto.'
      - 'La sabbia ha dimenticato i tuoi passi.

        Il risultato no.'
      - 'Il silenzio che è seguito

        pesava più del rumore.'
      - 'Il risultato non è cambiato.

        Ma tu hai raggiunto un nuovo livello.'
      - 'La meta era la stessa.

        Chi l’ha raggiunta, però, era cambiato.'
      - 'La destinazione è la stessa —

        ma il viandante non è più lo stesso.'
      - 'Il mondo non ti ha aperto una scorciatoia.

        Ti ha lasciato passare.'
      - 'Hai attraversato il margine

        senza spezzarlo.'
      - 'Il vetro non si è infranto.

        Ha ricordato il tuo peso.'
      - 'La luce ha resistito

        finché non hai trovato il centro.'
      - 'Non era fortuna.

        Era presenza.'
      - 'Il tempo non ti ha concesso nulla.

        Tu hai preso il ritmo.'
      - 'Il mare ha tenuto il segreto.

        Tu hai trovato la via.'
      - 'Hai raggiunto il bordo del silenzio

        senza perdere il tuo nome.'
      - 'La corsa è finita.

        La misura resta.'
      - Sei arrivato dove il rumore non serve più.
      - 'Anche il freddo ha riconosciuto

        la forma dei tuoi passi.'
  timeup:
    easy:
      pool:
      - 'Il tempo è finito.

        Nient’altro.'
      - 'Il tesoro può aspettare.

        Anche tu puoi.'
      - 'Questo era un inizio,

        non una condanna.'
      - 'Non sei arrivato.

        Ma hai visto la strada.'
      - 'Non hai fallito.

        Hai imparato la distanza.'
      - 'La corsa si è fermata.

        Tu no.'
      - 'TEMPO SCADUTO.

        La corsa è finita.

        Tu no.'
      - 'TEMPO SCADUTO.

        Il sentiero resta.

        Anche tu.'
      - 'Il mondo non ti ha chiuso fuori.

        Ti ha solo chiesto un altro tentativo.'
      - 'Il silenzio non era una fine.

        Era una pausa.'
      - 'Il vento ha coperto la traccia.

        Non il cammino.'
      - 'Un passo mancava.

        Il resto rimane.'
      - 'La sabbia ha preso il tempo.

        Non il senso.'
      - 'La porta si è chiusa piano.

        La strada no.'
      - Non tutto si trova al primo passaggio.
      - La prossima corsa saprà già il tuo nome.
    normal:
      pool:
      - 'Il tempo è scaduto.

        Ma la strada non è scomparsa.'
      - 'Non sei arrivato in tempo.

        Eppure qualcosa si è mosso.'
      - 'Il risultato ha retto.

        La posizione è cambiata.'
      - 'La luce si è ritirata.

        La direzione resta.'
      - 'Il silenzio ha segnato il punto.

        Riparti da lì.'
      - 'La distanza è rimasta.

        Ora però ha un nome.'
      - 'Il vento del nord non giudica.

        Misura soltanto.'
      - 'Non hai perso la via.

        Hai incontrato il suo limite.'
      - 'La corsa si è chiusa.

        Il cammino no.'
      - 'Ciò che non hai raggiunto

