outcome:
  notice:
    timeUpGameOver: Il tempo è scaduto. Partita finita.
    retryGuide: Riprova seguendo un percorso diverso.
  success:
    common:
      pool: []
    easy:
      pool:
      - 'Ce l’hai fatta.

        La verità rimane.'
      - 'Anche se era solo un piccolo passo,

        sei rimasto saldo.'
      - 'Hai ascoltato.

        E il sentiero si è aperto davanti a te.'
      - '> Sei arrivato fin qui.

        >

        > Le regole erano semplici —

        >

        > la scelta era tua.'
      - '> La distanza ha acquistato senso.

        >

        > E il tempo ha risposto a ogni tuo passo.'
      - '> Non tutto ciò che brilla dura per sempre.

        >

        > Ma questo istante sì.'
      - 'La luce è calata piano,

        e ogni ombra si è dissolta.'
      - 'Il vento si è zittito.

        Ogni cosa è tornata al suo posto.'
      - 'Un istante di silenzio.

        Il mondo ha ripreso il suo respiro.'
      - 'La traccia si è impressa nella sabbia —

        là dove il vento non arriva più.'
      - 'L’equilibrio è stato ristabilito.

        Tutto conduceva a questo istante.'
      - 'Il tempo è scivolato via in silenzio,

        custodito in un angolo della memoria.'
      - 'Il cielo ha cambiato colore,

        e una storia ha trovato la sua fine.'
      - 'Le onde si sono calmate,

        e il mare ha nascosto di nuovo le sue profondità.'
      - 'I passi si sono fermati,

        e il luogo solo è rimasto.'
      - 'Vittoria e sconfitta —

        in fondo, sono solo granelli di sabbia.'
      - 'La strada continua — oppure finisce qui.

        In ogni caso, riposa sulla stessa terra.'
    normal:
      pool:
      - 'La distanza ha finalmente preso senso.

        Il tempo ha risposto al tuo cammino.'
      - 'Il tempo è scaduto.

        Ma non tutto finisce qui.'
      - 'L’asse è stato trovato.

        Il mondo ha trattenuto il suo movimento.'
      - 'Il vetro ha trattenuto il respiro,

        e tu sei rimasto saldo.'
      - 'Sotto il cielo immobile,

        il tuo spirito non ha tremato.'
      - 'Poche cose brillano per sempre.

        Ma questo istante sì.'
      - 'Hai attraversato una terra fragile

        senza perdere l’orizzonte.'
      - 'L’istante è passato.

        Ciò che rimane, rimane.'
      - 'La fortuna svanisce in fretta.

        L’ordine resiste.'
      - 'Il cielo non conosce pause nel suo cerchio infinito,

        e nemmeno tu ti sei fermato.'
      - 'Hai raggiunto il centro.

        Il mondo si è immobilizzato.'
      - 'Finalmente sei qui.

        La verità rimane salda.'
      - 'Sei arrivato fino in fondo.

        Ricordalo: questa strada l’hai scelta tu. Nessun altro.'
      - 'Il tempo è scivolato nel silenzio

        e ha trovato posto nel profondo della memoria.'
      - 'Mentre il cielo cambiava colore,

        la storia ha trovato il suo compimento.'
      - 'Le acque si sono calmate,

        e il cielo ha di nuovo velato l’abisso.'
      - 'I passi si sono taciuti,

        e il luogo solo è rimasto.'
      - 'La luce è calata piano,

        e ogni ombra si è dissolta.'
      - 'Il vento si è zittito.

        Ogni cosa è tornata al suo posto.'
      - 'Un istante di silenzio.

        Il mondo ha ripreso il suo respiro.'
      - 'La traccia si è impressa nella sabbia —

        là dove il vento non arriva più.'
      - 'L’equilibrio è stato ristabilito.

        Tutto conduceva a questo istante.'
      - 'Corsa completata.

        Chiaro. Ritrovato.

        Questo basta.'
      - 'Corsa completata.

        Il cammino ha retto.

        Anche tu.'
      - 'Il cielo ha continuato il suo corso.

        Anche tu puoi continuare.'
      - 'Corsa completata.

        Un risultato silenzioso.

        Il peso del lavoro vero.'
      - 'Hai solo seguito il sentiero

        che il mondo aveva steso davanti a te.'
      - 'Il terreno non ha ceduto.

        Ha avuto fiducia nei tuoi passi.'
      - 'Questo istante si è accordato

        all’antico ritmo delle stelle.'
      - 'Non hai preso nulla.

        Hai capito qualcosa.'
      - 'Non hai ottenuto nulla per te solo.

        Hai solo visto la verità per ciò che era.'
      - 'Non hai conquistato questo luogo.

        Vi appartenevi.'
      - 'Hai imboccato una via

        più antica della memoria stessa.'
      - 'La terra non ha opposto resistenza.

        Ti ha riconosciuto.'
      - 'Questo istante si è accordato

        con il silenzio delle stelle.'
    hard:
      pool:
      - 'Nel vento del nord,

        la lucidità dura più della velocità.'
      - 'Il centro è stato trovato.

        Il mondo ha potuto acquietarsi.'
      - 'Le stelle restano in silenzio.

        La tua traccia parla per te.'
      - 'Il risultato è rimasto.

        La posizione è cambiata.'
      - 'Fra ghiaccio e vetro,

        hai scelto il controllo.'
      - 'Le onde si sono spente,

        e il mare ha ripreso le sue profondità nascoste.'
      - 'Altri tesori aspettano ancora.

        La prossima volta, un altro cammino.'
      - 'Il cielo non è cambiato.

        Tu sì.'
      - 'L’istante è passato.

        È rimasto l’ordine.'
      - 'L’inverno è onesto.

        Lo è stata anche la tua corsa.'
      - 'Le stelle si sono allineate per un istante.

        Tu l’hai visto.'
      - 'La distanza si è colmata.

        Il tempo no.'
      - 'Le regole del mondo sono rimaste salde.

        E il segno del possibile era reale.'
      - 'Il cammino si è richiuso in silenzio.

        Tu lo avevi già oltrepassato.'
      - 'Hai trovato quanto bastava.

        Il resto può aspettare.'
      - 'Non hai ottenuto tutto.

        Ma nulla è andato perduto.'
      - 'La sabbia ha cancellato i tuoi passi.

        Il risultato no.'
      - 'Il silenzio venuto dopo

        pesava più del rumore.'
      - 'Il risultato non è cambiato.

        Ma tu hai raggiunto un’altra soglia.'
      - 'La meta era la stessa.

        Ma chi l’ha raggiunta era cambiato.'
      - 'La destinazione è la stessa —

        ma il viandante non è più lo stesso.'
      - 'Il mondo non ti ha aperto una scorciatoia.

        Ti ha permesso di passare.'
      - 'Hai varcato il margine

        senza spezzarlo.'
      - 'Il vetro non si è infranto.

        Ha conservato il ricordo del tuo peso.'
      - 'La luce ha resistito

        finché non hai raggiunto il centro.'
      - 'Non è stata fortuna.

        Era presenza.'
      - 'Il tempo non ti ha concesso nulla.

        Tu ne hai preso il ritmo.'
      - 'Il mare ha tenuto il segreto.

        Tu hai trovato la via.'
      - 'Hai raggiunto il bordo del silenzio

        senza perdere il tuo nome.'
      - 'La corsa si è conclusa.

        La misura resta.'
      - Sei arrivato dove il rumore non serve più.
      - 'Anche il freddo ha riconosciuto

        la forma dei tuoi passi.'
  timeup:
    easy:
      pool:
      - 'Il tempo è finito.

        Null’altro.'
      - 'Il tesoro può aspettare.

        Anche tu.'
      - 'Era un inizio,

        non una condanna.'
      - 'Non sei arrivato.

        Ma hai visto il cammino.'
      - 'Non hai fallito.

        Hai imparato la misura della distanza.'
      - 'La corsa si è arrestata.

        Tu no.'
      - 'TEMPO SCADUTO.

        La corsa si è conclusa.

        Tu no.'
      - 'TEMPO SCADUTO.

        Il cammino resta.

        Anche tu.'
      - 'Il mondo non ti ha chiuso fuori.

        Ti ha chiesto soltanto un altro tentativo.'
      - 'Il silenzio non era una fine.

        Era una pausa.'
      - 'Il vento ha coperto le tracce.

        Non il cammino.'
      - 'Mancava un passo.

        Il resto rimane.'
      - 'La sabbia si è presa il tempo.

        Non il senso.'
      - 'La porta si è chiusa in silenzio.

        La strada no.'
      - Non tutto si trova al primo passaggio.
      - La prossima corsa saprà già il tuo nome.
    normal:
      pool:
      - 'Il tempo è scaduto.

        Ma il cammino non è scomparso.'
      - 'Non sei arrivato in tempo.

        Eppure qualcosa si è mosso.'
      - 'Il risultato è rimasto.

        La posizione è cambiata.'
      - 'La luce si è ritratta.

        La direzione resta.'
      - 'Il silenzio ha segnato il punto.

        Riparti da quel punto.'
      - 'La distanza è rimasta.

        Ma ora ha un nome.'
      - 'Il vento del nord non giudica.

        Misura e basta.'
      - 'Non hai perso la via.

        Ne hai incontrato il limite.'
      - 'La corsa si è chiusa.

        Il cammino no.'
      - 'Ciò che non hai raggiunto

        può ancora richiamarti.'
      - 'Il tempo ha vinto questa volta.

        Ma non per sempre.'
      - 'Il vetro ha tremato.

        Tu sei rimasto lì.'
      - 'La mappa non è finita.

        Si è soltanto piegata.'
      - 'Il mondo non ha cancellato i tuoi passi.

        Li ha custoditi.'
      - 'La sconfitta è stata quieta.

        Anche questo è un segno.'
      - 'Il centro non si è spostato.

        Aspetta ancora.'
      - Hai imparato il peso del limite.
      - 'Il silenzio dopo l’errore

        può diventare mappa.'
      - 'Il cielo ha chiuso la scena.

        Non il cammino.'
      - 'La prossima volta,

        il tempo ti riconoscerà prima.'
    hard:
      pool:
      - 'Non sei arrivato in tempo.

        Ma la misura era reale.'
      - 'Il freddo non perdona.

        Ma insegna.'
      - 'Il tempo si è chiuso.

        La tua traccia è rimasta.'
      - 'Hai mancato il centro.

        Non hai mancato il senso.'
      - 'Il vetro ha retto.

        Il tempo no.'
      - 'La corsa è finita ai margini.

        E i margini parlano.'
      - 'Non c’erano scorciatoie.

        Solo apprendimento.'
      - 'L’ombra è arrivata prima.

        Tu, comunque, sei arrivato.'
      - 'Il mare ha ripreso il segreto.

        Ma non la tua memoria.'
      - 'Le stelle non hanno applaudito.

        Hanno contato.'
      - 'Il risultato è stato duro.

        Proprio per questo è vero.'
      - 'La distanza è rimasta severa.

        Ma ha rivelato la propria verità.'
      - 'Il silenzio ha contato ogni passo.

        Anche gli ultimi.'
      - 'Non hai spezzato il limite.

        Lo hai visto da vicino.'
      - 'Il nord non consola.

        Rende tutto chiaro.'
      - 'La strada si è chiusa.

        La forma dei tuoi passi è rimasta.'
      - 'Il tempo si è preso la vittoria.

        Tu hai preso la lezione.'
      - 'Il centro era vicino.

        Non abbastanza.'
      - 'Il mondo è rimasto fermo.

        Tu hai imparato a muoverti meglio.'
      - 'La corsa non ti ha premiato.

        Ti ha reso più preciso.'
      - 'Il vento ha spento la luce.

        Non la direzione.'
      - 'La sconfitta non ha gridato.

        Ha lasciato un segno.'
      - 'Il luogo non ti ha respinto.

        Ti ha chiesto precisione.'
      - 'Il tempo non era crudele.

        Era esatto.'
      - 'Hai perso l’istante.

        Non il cammino.'
      - 'La fine è stata quieta.

        Il significato no.'
      - 'Ogni passo mancato

        è misura per il prossimo.'
      - 'Il cielo si è chiuso.

        La strada resta sotto i tuoi piedi.'
      - 'La distanza non ti ha ceduto.

        Ti ha mostrato il proprio peso.'
      - 'Sotto il nord,

        anche un piccolo passo è reale.'
      - 'Il margine ha vinto.

        Ma tu lo hai visto.'
      - 'Nessuna scorciatoia.

        Solo apprendimento.'
      - 'La sabbia ha coperto il risultato.

        Non il tentativo.'
      - 'Il silenzio ha chiuso la scena.

        Ma non la via.'
      - 'Il tempo ha detto no.

        La strada non ancora.'
      - 'Non era il finale.

        Era una soglia.'
      - 'La prossima corsa partirà

        da ciò che hai compreso.'
      - 'Il mondo non ha ceduto.

        Tu sei diventato più preciso.'
