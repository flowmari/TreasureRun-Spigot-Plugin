outcome:
  notice:
    timeUpGameOver: '時間切れです。ゲームオーバーです。'
    retryGuide: '別のルートでもう一度挑戦してみてください。'
  success:
    common:
      pool: []
    easy:
      pool:
      - たどり着いた。正さはそのままに。
      - 小さな一歩でも、あなたは守り抜いた。
      - 耳を澄ませた。道がひらいた。
      - 'あなたは辿り着いた。


        ルールは単純だった。


        選んだのは、あなた自身。'
      - '距離が意味になり、


        時間があなたの足取りに応えた。'
      - 'すべてが永遠に輝くわけじゃない。


        でも、この瞬間はそうだった。'
      - 光が等しく降り注ぎ、すべての影が消えた。
      - 風が止み、あるべき場所に、あるべきものが戻った。
      - 一瞬の静寂。世界がその呼吸を整えた。
      - 記録は砂に深く刻まれ、風もそれを動かせない。
      - 調和が訪れた。すべては、この瞬間のためにあった。
      - 時間は静かに流れ、記憶の隅に収まった。
      - 空の色が変わり、一つの物語が完結を告げた。
      - 波は穏やかになり、海は再びその深淵を隠した。
      - 歩みは止まり、場所だけがそこに残された。
      - 勝利も敗北も、同じ砂の一粒に過ぎない。
      - 道は続き、あるいは途切れ、どちらも同じ大地の上にある。
    normal:
      pool:
      - 距離が意味になった。時間があなたの歩みに答えた。
      - 時間は終わった。ほかは終わっていない。
      - 軸(中心)は見出された。世界はその運動を止めた。
      - ガラスは割れなかった。あなたも折れなかった。
      - 静かな空の下で、意志は持ちこたえた。
      - 永遠に輝くものなんてほとんどないけれど、この瞬間は別格だった。
      - 脆い地面を渡り切った。地平線景色をしっかりと握りしめたまま。
      - 瞬間は過ぎ去った。遺されたもの記録・功績は残る。
      - 運は速やかに消え、整い秩序は永続する。
      - 空はその終わりなき循環に休止を知らぬ。汝もまた、止まらず。
      - 中心は到達された。世界は立ち尽くし静止した。
      - ついに、ここへ辿り着いた。真実は屈することなく、そこに在る。
      - 完遂。この道を選んだのは他でもないあなただ。
      - 時は静寂へと漂い、精神の奥底の隅に自らの居場所を見つけた。
      - 空が姿を変えるとともに、一つの物語はその最終的な解決完結を見出した。
      - 波は静まり、空は再びその深淵を覆い隠した。
      - 歩みは途絶え、ただ場所だけがそこに在り続けた。
      - 光が等しく降り注ぎ、すべての影が消えた。
      - 風が止み、あるべき場所に、あるべきものが戻った。
      - 一瞬の静寂。世界がその呼吸を整えた。
      - 記録は砂に深く刻まれ、風もそれを動かせない。
      - 調和が訪れた。すべては、この瞬間のためにあった。
      - クリア。見つけた。それで十分。
      - 道は持ちこたえた。あなたも同じ。
      - 空はずっと歩み続けていた。あなたも進み続けられる。
      - 静かな結果。本物の積み重ね。
      - 世界が用意していた道を、あなたは歩いただけ。
      - 大地は壊れなかった。あなたの足取りを、信じていた。
      - この瞬間は、星々の長いリズムと重なった。
      - 何かを奪ったわけじゃない。何かを、理解した。
      - 手に入れたのは何かではない。真実を、見抜いただけだ。
      - 征服したのではない。ここに、属していた。
      - 記憶より古い道を、あなたは辿った。
      - 大地は抗わず、あなたを認識した。
      - この瞬間は、星々の静けさと重なった。
    hard:
      pool:
      - 北風の中で、速さより明晰さが生き残る。
      - 軸(中心)は見出された。世界はその運動を止めた。
      - 星は黙っている。語るのはあなたの記録だ。
      - 結果は残った。位置は変わった。
      - 氷とガラスのあいだで、あなたは制御を選んだ。
      - 波は静まり、海はその隠された深淵を再び自らのものとした。
      - 待つ宝もある。次は、別の道を。
      - 空は変わらなかった。変わったのはあなた。
      - 瞬間は過ぎた。整いは残った。
      - 冬は正直だ。あなたの走りもそうだった。
      - 星は束の間そろった。あなたはそれに気づいた。
      - 距離は縮んでいた。時間は縮まらなかった。
      - 世界のルールは、厳然としてそこにあった。可能性（信号）は本物だった。
      - 道は静かに閉じた。あなたはもう抜けていた。
      - 何も変わらない。ただ、あなたの位置だけが変わった。
      - 運じゃない。整いだ。
      - 瞬間は過ぎた。記録は残る。
      - 結果に違いはなかった。それでも、あなたは前に進んだ。
      - 出力は変わらないままだが、あなたは新しいレベルに到達した。
      - 結末は同じだが、そこに辿り着いた人間は変わった。
      - 目的地は同じだが、あなたはもう以前と同じ旅人ではない。
      - 光が等しく降り注ぎ、すべての影が消えた。
      - 風が止み、あるべき場所に、あるべきものが戻った。
      - 一瞬の静寂。世界がその呼吸を整えた。
      - 記録は砂に深く刻まれ、風もそれを動かせない。
      - 調和が訪れた。すべては、この瞬間のためにあった。
      - 時間は静かに流れ、記憶の隅に収まった。
      - 空の色が変わり、一つの物語が完結を告げた。
      - 波は穏やかになり、海は再びその深淵を隠した。
      - 歩みは止まり、場所だけがそこに残された。
      - 勝利も敗北も、同じ砂の一粒に過ぎない。
      - 道は続き、あるいは途切れ、どちらも同じ大地の上にある。
  timeup:
    easy:
      pool:
      - 時間は終わった。ほかは終わっていない。
      - 宝は待っている。あなたも待てる。
      - 息をして。もう一度。
      - 今回はここまで。次の一歩へ。
      - まだここにいる。それが大事。
      - 走りは止まった。あなたは止まっていない。
      - 時間は止まった。でも、あなたは止まっていない。
      - ルールは変わらない。もう一度。
      - 惜しい、は本物だ。
      - 日は落ち、影は再び世界を覆った。
      - 砂はすべて落ちきり、物語は静かに幕を閉じた。
      - 風が吹き抜け、足跡は跡形もなく消え去った。
      - 潮が満ちた。かつてそこにあったものは、海へと還った。
      - 沈黙。ただ、時間だけがそこを通り過ぎた。
      - 勝利も敗北も、同じ砂の一粒に過ぎない。
      - 道は続き、あるいは途切れ、どちらも同じ大地の上にある。
    normal:
      pool:
      - 距離は縮んだ。時間は縮まらなかった。
      - 世界はルールを守った。あなたは境界に触れた。
      - 届かなかった。でも合図は本物だった。
