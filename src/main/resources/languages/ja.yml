      - 空は動き続けた。あなたも動き続けられる。
      - 北は『待つこと』を覚えている。そこから学べ。
      - これは休止だ。終わりじゃない。
      - 雲が動き続けるように。川のように、流れを失わないで。
      - 音は近かった。距離は本物だった。でも、その瞬間は保存できない。
