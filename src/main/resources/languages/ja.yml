outcome:
  success:
    common:
      pool:
      - 光が等しく降り、すべての影が消えた。
      - 調和が戻り、すべてはこの瞬間へと収束した。
      - 静けさが満ち、ただ時間だけがそこを通り過ぎた。
    easy:
      pool:
      - たどり着いた。真実はそのままそこにある。
      - 耳を澄ませたとき、道は開いた。
      - 距離が意味を持ち、時間があなたの歩みに応えた。
    normal:
      pool:
      - 距離は意味を持ち、時間はあなたの旅路に応えた。
      - 走破完了。静かな結果。その背後に本物の積み重ねがある。
      - 瞬間は過ぎ、記録が残った。
    hard:
      pool:
      - 北風の中では、速さより明晰さが生き残る。
      - 運ではない。整いだ。
      - 変わったのは世界ではなく、その中でのあなたの位置だった。
  timeup:
    easy:
      pool:
      - 時間は尽きた。だが、それだけだ。
      - 走りは終わった。あなたは終わっていない。
      - 息を吸って。もう一度。
    normal:
      pool:
      - 距離は縮まった。時間は縮まらなかった。
      - 地図はまだ開いている。戻っておいで。
      - 宝に届かなくても、あの合図は本物だった。
    hard:
      pool:
      - オーロラでさえ消える。新しい歩みで戻れ。
      - 逃したのは瞬間であって、意味ではない。
      - 空は動き続けた。あなたもまた進み続けられる。
  random:
    common:
      pool: []
  fallback:
    runComplete: ラン完了。
    timeUp: タイムアップ。
