      - 空の色が変わり、一つの物語が完結を告げた。
      - 波は穏やかになり、海は再びその深淵を隠した。
      - 歩みは止まり、場所だけがそこに残された。
      - 勝利も敗北も、同じ砂の一粒に過ぎない。
      - 道は続き、あるいは途切れ、どちらも同じ大地の上にある。
  timeup:
    easy:
      pool:
      - 時間は終わった。ほかは終わっていない。
      - 宝は待っている。あなたも待てる。
      - 息をして。もう一度。
      - 今回はここまで。次の一歩へ。
      - まだここにいる。それが大事。
      - 走りは止まった。あなたは止まっていない。
      - 時間は止まった。でも、あなたは止まっていない。
      - ルールは変わらない。もう一度。
      - 惜しい、は本物だ。
      - 日は落ち、影は再び世界を覆った。
      - 砂はすべて落ちきり、物語は静かに幕を閉じた。
      - 風が吹き抜け、足跡は跡形もなく消え去った。
      - 潮が満ちた。かつてそこにあったものは、海へと還った。
      - 沈黙。ただ、時間だけがそこを通り過ぎた。
      - 勝利も敗北も、同じ砂の一粒に過ぎない。
      - 道は続き、あるいは途切れ、どちらも同じ大地の上にある。
    normal:
      pool:
      - 距離は縮んだ。時間は縮まらなかった。
