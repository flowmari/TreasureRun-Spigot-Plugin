outcome:
  fallback:
    runComplete: "Run complete."
    timeUp: "Time's up."
    trader: "Trade complete."
  notice:
    timeUpGameOver: Aika loppui. Peli päättyi.
    retryGuide: Yritä uudelleen toista reittiä pitkin.
  success:
    common:
      pool: []
    easy:
      pool:
      - 'Pääsit perille.

        Totuus säilyy.'
      - 'Vaikka se oli vain pieni askel,

        pysyit silti lujana.'
      - 'Kuuntelit.

        Siksi tie avautui.'
      - '> Pääsit tänne asti.

        >

        > Säännöt olivat yksinkertaiset —

        >

        > valinta oli sinun.'
      - '> Etäisyys sai merkityksen.

        >

        > Ja aika vastasi askeliisi.'
      - '> Kaikki valo ei loista ikuisesti.

        >

        > Mutta tämä hetki loisti.'
      - 'Valo laskeutui hiljaa,

        ja kaikki varjot väistyivät.'
      - 'Tuuli tyyntyi.

        Kaikki palasi paikalleen.'
      - 'Hiljainen hetki.

        Maailma veti taas rauhallisesti henkeä.'
      - 'Jälki painui syvälle hiekkaan —

        sinne, minne tuuli ei enää yllä.'
      - 'Tasapaino palautui.

        Kaikki oli johtanut tähän hetkeen.'
      - 'Aika lipui hiljaa ohi,

        tallettui muistin syrjään.'
      - 'Taivas vaihtoi väriä,

        ja yksi tarina tuli päätökseensä.'
      - 'Aallot tyyntyivät,

        ja meri kätki syvyytensä jälleen.'
      - 'Askeleet lakkasivat,

        ja vain paikka jäi jäljelle.'
      - 'Voitto ja tappio —

        lopulta ne ovat vain hiekanjyviä.'
      - 'Tie jatkuu — tai päättyy tähän.

        Kummassakin tapauksessa se lepää samalla maalla.'
    normal:
      pool:
      - 'Etäisyys sai viimein merkityksensä.

        Aika vastasi matkaasi.'
      - 'Aika kului loppuun.

        Mutta kaikki ei päättynyt.'
      - 'Akseli löytyi.

        Maailma pidätti liikkeensä.'
      - 'Lasi pidätti hengitystään,

        ja sinä pysyit lujana.'
      - 'Tyynen taivaan alla

        mielesi ei horjunut.'
      - 'Harva asia loistaa ikuisesti.

        Mutta tämä hetki oli kirkas.'
      - 'Kuljit hauraan maan yli

        kadottamatta suuntaasi.'
      - 'Hetki meni ohi.

        Se mikä jää, jää.'
      - 'Onni kuihtuu nopeasti.

        Järjestys pysyy.'
      - 'Taivas ei tunne taukoa loputtomassa kehässään,

        etkä sinäkään pysähtynyt.'
      - 'Saavutit keskuksen.

        Maailma jäi paikoilleen.'
      - 'Viimein olet tässä.

        Totuus pysyy.'
      - 'Kuljit loppuun asti.

        Muista: tämän tien valitsit sinä, ei kukaan muu.'
      - 'Aika valui hiljaisuuteen

        ja löysi paikkansa muistin syvyyksistä.'
      - 'Kun taivas vaihtoi väriään,

        tarina löysi päätöksensä.'
      - 'Vedet tyyntyivät,

        ja taivas peitti jälleen syvyytensä.'
      - 'Askeleet vaikenivat,

        ja vain paikka jäi jäljelle.'
      - 'Valo laskeutui hiljaa,

        ja kaikki varjot väistyivät.'
      - 'Tuuli vaikeni.

        Kaikki palasi omalle paikalleen.'
      - 'Hiljainen hetki.

        Maailma löysi jälleen hengityksensä.'
      - 'Jälki painui syvälle hiekkaan —

        sinne, minne tuuli ei enää yllä.'
      - 'Tasapaino palautui.

        Kaikki oli kulkenut kohti tätä hetkeä.'
      - 'Juoksu suoritettu.

        Selvä. Löytyi.

        Se riittää.'
      - 'Juoksu suoritettu.

        Tie kesti.

        Niin kestit sinäkin.'
      - 'Taivas jatkoi liikettään.

        Niin voit sinäkin.'
      - 'Juoksu suoritettu.

        Hiljainen tulos.

        Todellisen työn paino.'
      - 'Kuljit vain sitä polkua,

        jonka maailma oli eteesi asettanut.'
      - 'Maa ei pettänyt.

        Se luotti askeliisi.'
      - 'Tämä hetki asettui samaan rytmiin

        tähtiä vanhemman tahdin kanssa.'
      - 'Et ottanut mitään.

        Ymmärsit jotakin.'
      - 'Et saanut mitään omaksesi.

        Näit vain totuuden sellaisena kuin se oli.'
      - 'Et vallannut tätä paikkaa.

        Sinä kuuluit tänne.'
      - 'Kuljit tietä,

        joka on muistoakin vanhempi.'
      - 'Maa ei vastustanut.

        Se tunnisti sinut.'
      - 'Tämä hetki asettui samaan hiljaisuuteen

        tähtiä vasten.'
    hard:
      pool:
      - 'Pohjoistuulessa

        selkeys kestää nopeutta pidempään.'
      - 'Keskus löytyi.

        Maailma sai levätä.'
      - 'Tähdet vaikenevat.

        Jälkesi puhuu puolestasi.'
      - 'Tulos jäi voimaan.

        Sijainti muuttui.'
      - 'Jään ja lasin välissä

        valitsit hallinnan.'
      - 'Aallot vaikenivat,

        ja meri otti kätketyt syvyytensä takaisin.'
      - 'Joitakin aarteita odottaa vielä.

        Ensi kerralla toinen polku.'
      - 'Taivas ei muuttunut.

        Sinä muutuit.'
      - 'Hetki meni ohi.

        Jäljelle jäi järjestys.'
      - 'Talvi on rehellinen.

        Niin oli myös juoksusi.'
      - 'Tähdet asettuivat hetkeksi kohdalleen.

        Sinä huomasit sen.'
      - 'Etäisyys sulkeutui.

        Aika ei.'
      - 'Maailman säännöt pysyivät lujina.

        Ja mahdollisuuden merkki oli todellinen.'
      - 'Tie sulkeutui hiljaa.

        Olit jo kulkenut sen läpi.'
      - 'Mikään ei muuttunut.

        Vain paikkasi muuttui.'
      - 'Et saanut kaikkea.

        Mutta mikään ei mennyt hukkaan.'
      - 'Hetki meni ohi.

        Jälki jää.'
      - 'Lopputulos ei muuttunut.

        Silti kuljit eteenpäin.'
      - 'Tulos ei muuttunut.

        Mutta saavutit uuden tason.'
      - 'Päätepiste oli sama.

        Mutta sinne saapunut kulkija oli muuttunut.'
      - 'Määränpää on sama —

        mutta kulkija ei ole enää sama.'
      - 'Valo laskeutui hiljaa,

        ja kaikki varjot väistyivät.'
      - 'Tuuli vaikeni.

        Kaikki palasi omalle paikalleen.'
      - 'Hiljainen hetki.

        Maailma löysi jälleen hengityksensä.'
      - 'Jälki painui syvälle hiekkaan —

        sinne, minne tuuli ei enää yllä.'
      - 'Tasapaino palautui.

        Kaikki oli kulkenut kohti tätä hetkeä.'
      - 'Aika lipui ohi hiljaa,

        muiston nurkkaan talletettuna.'
      - 'Taivas vaihtoi väriä,

        ja yksi tarina tuli päätökseensä.'
      - 'Aallot tyyntyivät,

        ja meri kätki syvyytensä jälleen.'
      - 'Askeleet pysähtyivät,

        ja vain paikka jäi jäljelle.'
      - 'Voitto ja tappio —

        lopulta ne ovat vain hiekanjyviä.'
      - 'Tie jatkuu — tai päättyy tähän.

        Kummallakin tavalla se lepää samalla maalla.'
  timeup:
    easy:
      pool:
      - 'Aika loppui.

        Mikään muu ei.'
      - 'Aarre voi odottaa.

        Niin voit sinäkin.'
      - 'Tämä oli alku,

        ei tuomio.'
      - 'Tässä kaikki tältä erää.

        Seuraavaan askeleeseen.'
      - 'Olet yhä tässä.

        Sillä on merkitystä.'
      - 'Juoksu päättyi.

        Sinä et.'
      - 'AIKA LOPPUI.

        Juoksu päättyi.

        Sinä et.'
      - 'AIKA LOPPUI.

        Säännöt eivät muutu.

        Uudelleen.'
      - 'AIKA LOPPUI.

        “Melkein” on sekin totta.'
      - 'Aurinko painui alas,

        ja varjo peitti maailman jälleen.'
      - 'Viimeiset hiekanjyvät putosivat,

        ja tarina sulkeutui hiljaa.'
      - 'Tuuli pyyhkäisi yli,

        ja jalanjäljet katosivat jäljettömiin.'
      - 'Nousuvesi saapui,

        ja se mikä oli ollut siinä, palasi mereen.'
      - 'Hiljaisuus.

        Vain aika kulki läpi.'
      - 'Voitto ja tappio —

        lopulta ne ovat vain hiekanjyviä.'
      - 'Tie jatkuu — tai päättyy tähän.

        Kummallakin tavalla se lepää samalla maalla.'
    normal:
      pool:
      - 'Etäisyys sulkeutui.

        Aika ei.'
      - 'Maailma piti kiinni säännöistään.

        Sinä kosketit rajaa.'
      - 'Et ehtinyt perille.

        Mutta merkki oli todellinen.'
      - 'Joitakin aarteita odottaa vielä.

        Kokeillaan seuraavaksi toista polkua.'
      - 'Tulos jäi voimaan.

        Sijainti muuttui.'
      - 'Jään ja lasin välissä

        opit hallinnan.'
      - 'Ovi ei sulkeutunut.

        Aika vain ehti ensin.'
      - 'Pohjoistuuli ei tuomitse.

        Se vain mittaa.'
      - 'Jäljelle jäi järjestys.

        Ja mahdollisuus palata.'
      - 'Juoksu pysähtyi,

        mutta suunta jäi eloon.'
      - 'Taivas ei kiirehtinyt.

        Sinunkaan ei tarvitse kadota.'
      - 'Tämä ei ollut loppu.

        Se oli mitta.'
      - 'Aika sanoi ei.

        Matka ei.'
      - 'Et menettänyt tietä.

        Se vain odottaa hiljaa.'
      - 'Viimeinen askel jäi vielä ottamatta.

        Siksi seuraava on olemassa.'
      - 'Varjo palasi,

        mutta silmäsi olivat jo nähneet valon.'
      - 'Aarre pysyi paikallaan.

        Sinä pääsit lähemmäs.'
      - 'Säännöt olivat ankarat.

        Yritys oli todellinen.'
      - 'Et saavuttanut kaikkea.

        Mutta et tullut tyhjin käsin.'
      - 'Hiljaisuus laskeutui.

        Tie jäi näkyviin.'
    hard:
      pool:
      - 'Aika loppui pohjoistuulessa.

        Mutta suuntasi ei kadonnut.'
      - 'Jää ei murtunut.

        Se vain odotti seuraavaa askelta.'
      - 'Et ehtinyt perille.

        Silti mitta oli todellinen.'
      - 'Maailma pysyi kylmänä.

        Sinä pysyit liikkeessä.'
      - 'Tulosta ei annettu.

        Mutta jälki jäi.'
      - 'Tie vaati enemmän aikaa

        kuin tällä kertaa oli jäljellä.'
      - 'Tähdet eivät vastanneet.

        Ne vain katsoivat.'
      - 'Etäisyys jäi auki.

        Se tarkoittaa, että polku on yhä olemassa.'
      - 'Kylmä ei valehtele.

        Tänään se vain mittasi sinut.'
      - 'Aarre jäi odottamaan.

        Se ei kadonnut.'
      - 'Taivas ei muuttunut.

        Mutta jokin sinussa liikahti.'
      - 'Juoksu pysähtyi.

        Harjoitus jäi elämään.'
      - 'Ei voittoa.

        Mutta ei tyhjyyttäkään.'
      - 'Aika sulki portin.

        Se ei poistanut tietä.'
      - 'Pohjoinen pysyi vaiti.

        Askeleesi eivät.'
      - 'Lasi pysyi kylmänä.

        Yrityksesi pysyi todellisena.'
      - 'Tämä ei ollut epäonnistuminen.

        Se oli kartta.'
      - 'Maailman säännöt pysyivät lujina.

        Siksi seuraava yritys merkitsee jotakin.'
      - 'Aika päättyi.

        Kokemus jäi.'
      - 'Et ylittänyt rajaa.

        Mutta löysit sen.'
      - 'Jää sulki näkymän.

        Muisti ei.'
      - 'Tulos jäi saamatta.

        Suunta jäi.'
      - 'Se ei ollut voitto.

        Se oli mitta.'
      - 'Tie päättyi tältä erää.

        Matka ei.'
      - 'Kylmä ilma sanoi: ei vielä.

        Ei: ei koskaan.'
      - 'Tähdet pysyivät kaukana.

        Silti kuljit niiden alla.'
      - 'Lopetus oli hiljainen.

        Merkitys ei kadonnut.'
      - 'Aika sai viimeisen sanan.

        Sinulle jäi seuraava askel.'
      - 'Tänään et saanut kaikkea.

        Mutta näit rajasi.'
      - 'Tuuli pyyhki jäljet.

        Ei yritystä.'
      - 'Maailma ei taipunut.

        Sinä opit lukemaan sitä.'
      - 'Pohjoisen alla

        pienikin askel on todellinen.'
      - 'Lasi, jää ja hiljaisuus —

        ne kaikki muistavat liikkeen.'
      - 'Et löytänyt oikotietä.

        Löysit työn.'
      - 'Hetki sulkeutui.

        Mahdollisuus jäi raolleen.'
      - 'Aika ei riittänyt.

        Sinä riitit aloittamaan.'
      - 'Oikotietä ei ollut.

        Vain oppimista.'
      - 'Tie on ankara.

        Siksi palaaminen merkitsee jotakin.'
