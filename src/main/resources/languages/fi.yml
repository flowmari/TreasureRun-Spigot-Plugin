outcome:
  success:
    common:
      pool:
      - Valo putosi tasaisesti ja jokainen varjo katosi.
      - Harmonia palasi. Kaikki oli johtanut tähän hetkeen.
      - Hiljaisuus laskeutui. Vain aika jatkoi kulkuaan.
    easy:
      pool:
      - Onnistuit. Totuus pysyy.
      - Kuuntelit ja tie aukesi.
      - Matka löysi merkityksensä ja aika vastasi askeleitasi.
    normal:
      pool:
      - Matka löysi merkityksensä. Aika vastasi matkasi.
      - Juoksu suoritettu. Hiljainen tulos, oikean työn tukemana.
      - Hetki kului. Ennätys jäi.
    hard:
      pool:
      - Pohjoistuulessa selkeys kestää nopeutta pidempään.
      - Ei tuuria. Kohdistumista.
      - Maailma ei muuttunut. Paikkasi siinä muuttui.
  timeup:
    easy:
      pool:
      - Aika loppui. Ei muuta.
      - Juoksu päättyi. Sinä et.
      - Hengitä syvään. Sitten vielä kerran.
    normal:
      pool:
      - Välimatka supistui. Aika ei.
      - Kartta on vielä auki. Palaa siihen.
      - Aarre jäi ulottumattomiin, mutta signaali oli todellinen.
    hard:
      pool:
      - Edes revontulet sammuvat. Palaa uusin askelin.
      - Hetki lipui pois. Merkitys ei.
      - Taivas jatkoi liikettään. Sinäkin voit.
  random:
    common:
      pool: []
  fallback:
    runComplete: Juoksu suoritettu.
    timeUp: Aika loppui.
