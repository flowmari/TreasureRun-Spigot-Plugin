outcome:
  fallback:
    runComplete: Run complete.
    timeUp: Time's up.
    trader: Trade complete.
  notice:
    timeUpGameOver: Время вышло. Игра окончена.
    retryGuide: Попробуйте снова, выбрав другой путь.
  success:
    common:
      pool: []
    easy:
      pool:
      - 'Ты дошёл.

        Истина осталась на своём месте.'
      - 'Пусть это был всего один маленький шаг,

        ты всё равно не отступил.'
      - 'Ты услышал —

        и путь открылся сам.'
      - '> Ты дошёл сюда.

        >

        > Правила были просты —

        >

        > выбор всё это время был за тобой.'
      - '> Расстояние обрело смысл.

        >

        > И время ответило на твои шаги.'
      - '> Не всякому свету дано гореть вечно.

        >

        > Но этот миг действительно сиял.'
      - 'Свет лёг тихо и ровно,

        и все тени отступили.'
      - 'Ветер стих.

        Всё снова стало на свои места.'
      - 'Мгновение тишины.

        Мир снова перевёл дыхание.'
      - 'След глубоко лёг в песок —

        туда, куда уже не достанет ветер.'
      - 'Равновесие вернулось.

        Всё вело именно к этому мигу.'
      - 'Время тихо скользнуло мимо

        и осело в уголке памяти.'
      - 'Небо сменило цвет,

        и одна история подошла к концу.'
      - 'Волны улеглись,

        и море снова спрятало свою глубину.'
      - 'Шаги остановились,

        и осталось лишь это место.'
      - 'Победа и поражение —

        в конце концов всего лишь песчинки.'
      - 'Дорога продолжается — или заканчивается здесь.

        В любом случае она лежит на той же земле.'
    normal:
      pool:
      - 'Расстояние наконец обрело смысл.

        Время откликнулось на твой путь.'
      - 'Время вышло.

        Но ещё не всё окончено.'
      - 'Ось найдена.

        Мир замедлился и остановился.'
      - 'Стекло затаило дыхание,

        а ты удержался на месте.'
      - 'Под неподвижным небом

        ты не дрогнул.'
      - 'Мало что сияет вечно.

        Но этот миг был чистым и светлым.'
      - 'Ты прошёл по хрупкой земле

        и не отвёл взгляда.'
      - 'Мгновение прошло.

        Но то, что осталось, всё ещё здесь.'
      - 'Удача быстро меркнет.

        Порядок остаётся.'
      - 'Небо не останавливается в своём бесконечном круге,

        и ты тоже не остановился.'
      - 'Ты дошёл до центра.

        Мир замер.'
      - 'Наконец — здесь.

        Истина всё ещё непоколебима.'
      - 'Ты дошёл до конца.

        Запомни: этот путь выбрал ты, и никто другой.'
      - 'Время скользнуло в тишину

        и нашло себе место глубоко внутри.'
      - 'Пока небо меняло цвет,

        история подошла к своему финалу.'
      - 'Воды улеглись,

        и небо снова прикрыло свою бездну.'
      - 'Шаги стихли,

        и осталось только это место.'
      - 'Свет лёг тихо и ровно,

        и все тени отступили.'
      - 'Ветер стих.

        Всё снова стало на свои места.'
      - 'Мгновение тишины.

        Мир снова перевёл дыхание.'
      - 'След глубоко лёг в песок —

        туда, куда уже не достанет ветер.'
      - 'Равновесие вернулось.

        Всё вело именно к этому мигу.'
      - 'Забег завершён.

        Ясно. Найдено.

        Этого хватит.'
      - 'Забег завершён.

        Путь выдержал.

        И ты выдержал.'
      - 'Небо продолжало двигаться.

        Ты тоже можешь.'
      - 'Забег завершён.

        Тихий результат.

        Вес настоящего труда.'
      - 'Ты просто прошёл дорогой,

        которую мир расстелил перед тобой.'
      - 'Земля не ушла из-под ног.

        Она поверила твоим шагам.'
      - 'Этот миг совпал

        с древним ритмом звёзд.'
      - 'Ты ничего не забрал.

        Ты что-то понял.'
      - 'Ты ничего не приобрёл.

        Ты лишь увидел истину такой, какова она есть.'
      - 'Ты не завоевал это место.

        Ты с самого начала был его частью.'
      - 'Ты прошёл дорогой,

        что старше самой памяти.'
      - 'Земля не сопротивлялась.

        Она тебя узнала.'
      - 'Этот миг совпал

        с тишиной звёзд.'
    hard:
      pool:
      - 'На северном ветру

        ясность живёт дольше скорости.'
      - 'Центр был найден.

        Мир пришёл к покою.'
      - 'Даже там, где стекло было готово треснуть,

        ты не потерял направление.'
      - 'Холод поднимался от земли,

        но твои шаги не сбились.'
      - 'Ветер пытался стереть следы.

        Но путь уже успел тебя запомнить.'
      - 'Ты дошёл туда,

        где шум уже не властен.'
      - 'Тебя привела сюда не сила,

        а выдержка.'
      - 'Хрупкий мир не простил бы спешки.

        И ты это понял.'
      - 'Свет дрожал,

        но так и не погас.'
      - 'Там, где всё могло исчезнуть,

        ты всё же остался.'
      - 'Небо было далеко.

        Земля была тонка.

        И всё же ты прошёл.'
      - 'Ты не победил холод.

        Ты научился проходить сквозь него.'
      - 'Забег завершён.

        Трудный путь.

        Настоящее доказательство.'
      - 'Центр не звал громко.

        Он ждал тихо.'
      - 'Твои шаги стали ответом

        на вопрос, который никто не произнёс.'
      - 'Путь был узким.

        Решение — твоим.'
      - 'Стекло помнило каждый шаг.

        И не разбилось.'
      - 'Ты прошёл не быстрее всех.

        Ты прошёл точнее всех.'
      - 'Даже тишина

        признала твой приход.'
      - 'Мир остановился не сразу.

        Но всё же остановился.'
      - 'Всё лишнее отпало.

        Остался только путь.'
      - 'Ты дошёл до места,

        где победа уже не шумит.'
      - 'Ни ветер, ни время

        не смогли стереть этот след.'
      - 'Ты не требовал ответа.

        Но он пришёл.'
      - 'То, что казалось хрупким,

        выдержало вместе с тобой.'
      - 'Забег завершён.

        Свет остался.

        След остался.

        Ты остался.'
      - 'Северный ветер стих не потому, что проиграл.

        Он просто увидел достаточно.'
      - 'Ты прошёл через край карты

        и всё же остался в мире.'
      - 'В этом месте

        даже молчание стало ясным.'
      - 'Дорога не стала легче.

        Зато ты стал спокойнее.'
      - 'Последний шаг был тихим.

        Но именно он всё решил.'
      - 'Там, где всё должно было рассыпаться,

        появился порядок.'
  timeup:
    easy:
      pool:
      - 'Время вышло.

        Но путь всё ещё помнит твои шаги.'
      - 'Ты не дошёл.

        Но ты начал — и это уже оставило след.'
      - 'Песок принял этот результат

        без упрёка.'
      - 'Свет погас не сразу.

        Он просто стал тише.'
      - 'Ветер прошёл по следам,

        но не всё смог стереть.'
      - 'Не всякий путь заканчивается находкой.

        Некоторые учат слушать.'
      - 'Мир не закрылся.

        Он просто ждёт другой попытки.'
      - 'Часы остановились.

        Но движение внутри осталось.'
      - 'Сегодня дорога оборвалась.

        Завтра она может открыться иначе.'
      - 'Ты потерял время,

        но не смысл.'
      - 'Поражение не бывает громким.

        Оно просто просит вернуться внимательнее.'
      - 'Небо не отвернулось.

        Оно только сменило цвет.'
      - 'След короткий,

        но настоящий.'
      - 'Путь не исчез.

        Он превратился в вопрос.'
      - 'Время забрало попытку.

        Опыт остался.'
      - 'Конец забега —

        ещё не конец дороги.'
    normal:
      pool:
      - 'Время вышло.

        Мир не сказал «нет» —

        он сказал «ещё не сейчас».'
      - 'Ты был близко.

        Иногда близость тоже оставляет след.'
      - 'Путь не раскрылся до конца,

        но направление стало яснее.'
      - 'Стекло дрогнуло,

        и ты увидел, где оно тоньше всего.'
      - 'Неудача прошла тихо.

        Но урок остался.'
      - 'Ветер унёс часть следов.

        Остальные остались в тебе.'
      - 'Этот забег не стал победой.

        Он стал картой.'
      - 'Там, где ты остановился,

        путь всё ещё дышит.'
      - 'Время не простило задержки,

        но запомнило попытку.'
      - 'Ты не дошёл до центра.

        Но стал к нему ближе.'
      - 'Забег окончен.

        Ответ ещё впереди.'
      - 'Мир не рухнул.

        Он просто не открылся до конца.'
      - 'В этой тишине

        есть место для следующего шага.'
      - 'Ты увидел предел.

        Теперь знаешь, где его искать.'
      - 'Не всё потеряно.

        Некоторые вещи созревают уже после поражения.'
      - 'Песок закрыл следы,

        но не стер смысл.'
      - 'Небо осталось в движении.

        И тебе ещё можно двигаться.'
      - Сегодня путь оказался длиннее отведённого времени.
      - 'Неудача — не пустота.

        Это тоже форма памяти.'
      - 'Время вышло.

        Но дорога ещё не отказалась от тебя.'
    hard:
      pool:
      - 'Время вышло.

        Северный ветер оказался быстрее.'
      - 'Холод сомкнулся раньше,

        чем путь успел открыться.'
      - 'Ты не дошёл.

        Но выдержал больше, чем казалось возможным.'
      - 'Стекло треснуло где-то вдали.

        Мир напомнил о своей хрупкости.'
      - 'Трудный путь не дал ответа.

        Зато показал цену вопроса.'
      - 'Ветер забрал следы,

        но не забрал саму попытку.'
      - 'Здесь поражение не кричит.

        Оно стоит молча рядом.'
      - 'Ты встретил край.

        Теперь знаешь, где он начинается.'
      - 'Время закончилось.

        Но ясность не исчезла.'
      - 'Холод победил этот забег,

        но не твою способность вернуться.'
      - 'Мир остался закрытым.

        Пока.'
      - 'Каждый неточный шаг

        стал частью будущей точности.'
      - 'Ты дошёл не до конца,

        а до границы.'
      - 'В этой неудаче

        есть форма силы.'
      - 'Свет погас.

        Но направление осталось.'
      - Стеклянная земля не простила промедления.
      - 'Небо двигалось без остановки.

        Ты остановился — чтобы понять.'
      - 'Не всякая попытка должна сиять.

        Некоторые должны закалять.'
      - 'Путь не был милосерден.

        Но он был честен.'
      - 'Сегодня центр остался недостижимым.

        Значит, он всё ещё ждёт.'
      - 'Северный ветер стёр карту.

        Но не память.'
      - 'Забег окончен.

        Тишина тяжела,

        но не пуста.'
      - 'Время ушло.

        След остался под песком.'
      - 'Ты проиграл не миру,

        а минутам.'
      - 'Хрупкая земля потребовала большего.

        Теперь ты это знаешь.'
      - 'Поражение легло рядом,

        как холодная тень.'
      - 'Этот финал не красив.

        Но он настоящий.'
      - 'Мир не раскрылся.

        Зато показал, где сопротивляется.'
      - 'Твои шаги оборвались.

        Но путь не исчез.'
      - 'Ветер был суров.

        И всё же ты шёл.'
      - 'Здесь неудача —

        не стыд, а отметка глубины.'
      - 'Попытка завершена.

        След скрыт.

        Возвращение возможно.'
      - 'Сегодня порядок не сложился.

        Но его контур уже виден.'
      - 'Там, где всё остановилось,

        начинается новая точность.'
      - 'Время вышло.

        Но это ещё не последнее слово.'
      - 'Путь оказался жёстче надежды.

        И всё же надежда осталась.'
      - 'Тьма подошла ближе.

        Но свет не забыт.'
      - 'Этот забег ушёл в тишину.

        Следующий начнётся из неё.'
