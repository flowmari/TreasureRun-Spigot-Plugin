  menu:
    toc:
      message: '&6===== 🌟 TreasureRun सामग्री 🌟 =====

        &b1. लक्ष्य

        &f   ・समय सीमा में अधिक से अधिक संदूक खोलें।


        &b2. वर्तमान कठिनाई

        &f   ・कठिनाई: &e{difficulty}


        &b3. कठिनाई और रंग

        &f   ・आसान ：बैंगनी ब्लॉक

        &f   ・सामान्य：हरे ब्लॉक

        &f   ・कठिन  ：नीले ब्लॉक


        &b4. कैसे खेलें

        &f   ・दौड़ें, संदूक खोजें, राइट-क्लिक से खोलें।


        &b5. स्कोर

        &f   ・सामान्य खजाना: +100

        &f   ・विशेष खजाना (नेदराइट / ब्लॉक आदि): बोनस!


        &b6. समाप्ति की शर्तें

        &f   ・सभी संदूक खोलें या समय समाप्त — खेल समाप्त।


        &b7. उद्धरण संग्रह

        &f   ・SUCCESS / TIME_UP पर स्वतः सहेजा जाता है।


        &b8. पसंदीदा

        &f   ・★ से पसंदीदा उद्धरण सहेजें।


        &6=================================='
