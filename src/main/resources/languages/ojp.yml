outcome:
  fallback:
    runComplete: 成し遂げ給ひぬ。
    timeUp: 時、つひに尽きにけり。
    trader: 交易、すでに果てにけり。
  notice:
    timeUpGameOver: 時、つひに尽きにけり。遊びはここに果てぬ。
    retryGuide: 別なる道を取り、いま一度挑み給へ。
  success:
    common:
      pool:
      - いとめでたし。
      - 見事なり。
      - 宝をことごとく見出だし給ひぬ。
      - この遊び、よく果たし給へり。
      - この勝ち、まことにあはれなるものなり。
    easy:
      pool:
      - たどり着き給ひぬ。まことは、まことのままにあり。
      - 小さき一歩なれど、汝はよく守り果て給ひぬ。
      - 耳を澄ませば、道はおのづから開けにけり。
      - 汝、つひに辿り着き給ひぬ。\n\n御掟はただ一つなり。\n\n選びしは、ほかならぬ汝なり。
      - 隔たりはしるしとなり、\n\n時は汝の足取りに応へにけり。
      - すべてのもの、とこしへに輝くにはあらず。\n\nされど、この刹那ばかりは、まこと輝きたり。
      - あまねき光、天よりしづかに降りそそぎ、影といふ影、跡なく消えにけり。
      - 風やみぬ。あるべきものは、おのが所へ静かに帰りにけり。
      - ただ一時のしじまあり。世は音もなく息を整へにけり。
      - その記し、砂の面に深く刻まれ、風すらこれを動かし得ざりき。
      - 調べ、つひに訪れぬ。よろづのこと、この刹那のためにありけり。
      - 時はしづかに流れ、記憶の奥へおのづから収まりにけり。
      - 天の色あらたまりて、一つの物語、ここに結びを告げにけり。
      - 波は穏やかに鎮まり、海はふたたび深き底を隠しにけり。
      - 歩みは止まりぬ。ただその所のみ、しづかに残りけり。
      - 勝ちも負けも、つひには同じ砂の一粒に過ぎざりけり。
      - 道は続き、また途絶ゆ。いづれも同じ大地の上にありけり。
    normal:
      pool:
      - 隔たりはしるしとなり、時は汝の歩みに応へたり。
      - 時は果てぬ。されど、ほかはまだ果てず。
      - 軸は見出だされぬ。世はそのめぐりを止めたり。
      - 硝子は砕けず。汝もまた、折れざりき。
      - 静かなる天の下、志はよく持ちこたへたり。
      - とこしへに輝くものは多からず。されど、この刹那は別なりき。
      - 脆き地を渡り果て、汝は地平の景を手放さざりき。
      - 刹那は過ぎぬ。されど記しと功は残りたり。
      - 運はたちまち消ゆ。されど整ひは長く残るものなり。
      - 天はめぐりを休まず。汝もまた、止まることなかれ。
      - 中心に至りぬ。世は立ち尽くし、静まりたり。
      - つひに、ここへ至り給ひぬ。まことは屈せず、そこにあり。
      - 完遂せり。この道を選びしは、ほかならぬ汝なり。
      - 時はしじまへ漂ひ、心の奥にその居所を得たり。
      - 天、姿を変へ、一つの物語はここに結びを得たり。
      - 波は静まり、天はふたたび深きものを覆ひ隠しぬ。
      - 歩みは途絶え、ただ場所のみ、そこにあり続けたり。
      - 雲間より光さし、道の末はほのかに明らみけり。
      - 露は草葉にとどまり、歩みし跡をしづかに照らしけり。
      - 遠き鐘の音、海の底よりかすかに聞こえたり。
      - 月影は水面にくだけ、しるしはなほ消えざりけり。
      - 小さき火は風に揺れつつも、つひに消えざりき。
      - 成就せり。見出だし給ひぬ。それにて足れり。
      - 道は持ちこたへたり。汝もまた、然り。
      - 天は歩みをやめざりき。汝もまた、進み続け給へ。
      - 静かなる果て。まことの積み重ねなり。
      - 世の備へし道を、汝はただ歩み給ひぬ。
      - 大地は崩れず。汝の足取りを、信じたり。
      - この刹那、星々の長き調べと重なりぬ。
      - 何かを奪ひしにはあらず。ただ、何かを悟り給ひぬ。
      - 手に入れしは物にあらず。まことを見抜き給ひしのみ。
      - 征服せしにあらず。汝は、もとよりここに属し給ひき。
      - 記憶よりも古き道を、汝は辿り給ひぬ。
      - 大地は抗はず、汝を認めたり。
      - この刹那、星々の静けさと重なりぬ。
    hard:
      pool:
      - 北風の中にては、速さよりも明らけき心こそ残る。
      - 汝が歩み、砂の上にしづかなる文となりぬ。
      - 星は黙せり。語るは、汝の記しのみ。
      - 果ては残れり。されど、ありかは移りぬ。
      - 氷と硝子のあはひにて、汝は乱れぬ歩みを選び給ひぬ。
      - 波は静まり、海は隠せし深淵をふたたび己がものとせり。
      - 待つ宝もあり。次は、別なる道へ。
      - 天は変はらず。変はりしは、汝なり。
      - 刹那は過ぎぬ。されど、整ひは残れり。
      - 冬は正直なり。汝の走りもまた然り。
      - 星はしばし並びたり。汝はそれを見逃さざりき。
      - 隔たりは縮みたり。されど、時は縮まざりき。
      - 世の御掟は、厳としてそこにあり。しるしは、まことなりき。
      - 道は静かに閉ぢぬ。汝はすでに、その外へ抜けたり。
      - 何も変はらず。ただ、汝のありかのみ変はりぬ。
      - 運にあらず。整ひなり。
      - 刹那は過ぎぬ。記しは残れり。
      - 果てに違ひはなかりき。されど、汝は前へ進み給ひぬ。
      - 得られしものは変はらず。されど、汝は一つ高き境へ至りぬ。
      - 結びは同じなり。されど、そこへ至りし汝は、もはや同じにあらず。
      - 目指す地は同じなり。されど、汝はもはや昔日の旅人にあらず。
      - 夜は深けれど、行くべき方はほのかに見えたり。
      - ひとたび閉ぢし扉、また音もなく開きにけり。
      - 潮の香の中に、過ぎし時の名残ただよひけり。
      - 星ひとつ落ちて、道のほとりを照らしけり。
      - 沈みし光、また波の間より帰り来たり。
      - ほの暗き岸辺に、汝のしるしのみ残りけり。
      - 風は言葉を奪へど、志までは奪ひ得ざりき。
      - 時の砂、こぼれつつも、心の器には満ちにけり。
      - 影は長く伸びたり。されど道はなほ尽きざりき。
      - 遠き空の色、汝の歩みに応へて変はりけり。
      - 一筋の光、深き闇を裂きて現れにけり。
  timeup:
    easy:
      pool:
      - 荒き波の果てに、静けき浜辺はありけり。
      - 宝は待てり。汝もまた、待つことを知り給へ。
      - 息を整へ給へ。いま一度。
      - こたびはここまで。次なる一歩へ進み給へ。
      - 汝はなほ、ここにあり。それこそ大事なり。
      - 走りは止まりぬ。されど、汝は止まらず。
      - 時は止まりぬ。されど、汝はまだ止まらず。
      - 御掟は変はらず。いま一度。
      - 惜しきこと、まことなり。
      - 日は入り、影はふたたび世を覆ひぬ。
      - 砂はことごとく落ち、物語は静かに幕を閉ぢぬ。
      - 風は吹き抜け、足跡は跡形もなく消えぬ。
      - 潮満ちぬ。かつてそこにありしものは、海へ還りぬ。
      - 沈黙。ただ時のみ、そこを過ぎ行きぬ。
      - 消えしと思ひし火、灰の底にまだ息づきたり。
      - 汝が選びし道、今は物語となりにけり。
    normal:
      pool:
      - まことの宝は、開きし櫃の奥にのみあらざりき。
      - 世は御掟を守れり。汝はその境に触れたり。
      - 届かざりき。されど、しるしはまことなり。
      - 待つ宝もあり。別なる道を試み給へ。
      - 静寂は深まり、勝ち負けを越えて夜は澄みけり。
      - 時は果てぬ。されど、しるしはまだ果てず。
      - 惜しかりき。音もまた、さう告げたり。
      - 地図はなほ開かれたり。帰り来給へ。
      - 水鳥の影、ひとたび揺れて、また空へ帰りぬ。
      - 世は御掟を守れり。
      - 道の石、ひとつひとつが汝を覚えたり。
      - 天つ風、汝が名をしづかに運び去りけり。
      - 過ぎし刹那、露となりて草葉に宿りぬ。
      - 旅の終はりは、また新しき門の前なりけり。
      - 手に取りし宝より、歩みし時こそ尊かりけれ。
      - 汝の息、静かに夜気へ溶け入りにけり。
      - 海は語らず。されど、すべてを見届けたり。
      - 星々は黙して、汝の帰りを待ちゐたり。
      - 時は果てぬ。\n\nされど、それ以外はまだ果てず。
      - 果ては変はらざりき。\n\nされど、汝のありかは変はりぬ。
    hard:
      pool:
      - 極光すら消ゆ。新しき歩みにて帰り来給へ。
      - 脆き世にては、焦りこそ明らけき心を砕くものなり。
      - 逃ししは刹那なり。しるしにはあらず。
      - 冬は忍び待つものなり。汝もまた、さあれ。
      - 天は進み続けたり。汝もまた進み給へ。
      - 叙事は頁をめくる。これは終はりにあらず。
      - 星は見守りたり。いま一度。
      - 氷は急がず。汝も急ぐことなかれ。
      - 天は動き続けたり。汝もまた、動き続け得る。
      - 北は待つことを知れり。そこより学び給へ。
      - これは休止なり。終はりにはあらず。
      - 雲の動きやまぬがごとく、川の流れ絶えぬがごとく。
      - 音は近かりき。隔たりはまことなりき。されど、その刹那は記し置き得ざりき。
      - 近づきたり。されど、時のみ近づかざりき。
      - 世は御掟を守れり。汝はその縁に触れたり。
      - 宝には届かざりき。されど、しるしはまことなり。
      - ひとつの影去りて、ひとつの光生まれにけり。
      - 道は細けれど、志はつひに折れざりき。
      - 霧は晴れ、残りしものの形あらはれにけり。
      - 脆き地を渡りたり。景を壊さぬままに。
      - 何も変はらず。ただ、汝のありかのみ変はりぬ。\n運にあらず。整ひなり。\n刹那は過ぎぬ。記しは残れり。
      - 失ひし時さへ、汝の糧となりにけり。
      - 暮れゆく空に、勝ちの色もしづかに沈みぬ。
      - 開かれし櫃は、ただ宝のみを語らざりき。
      - 終はりの鐘、遠く鳴りて、心に長く残りけり。
      - 踏みしめし大地、汝の重みを忘れざりけり。
      - 光は去りぬ。されど、まなざしの奥に残りけり。
      - ひそやかなる勝ち、声高ならずして美しきものなり。
      - 季節は閉ぢぬ。されど、大地はなほ残れり。
      - 道はなほ、そこにあり。歩みを止めしは、ただ汝なり。
      - 汝の時は果てぬ。されど、天は果てず。
      - 拒みにはあらず。ただ、沈黙なりき。
      - 世は形を保てり。変はりし汝にて、また帰り来べし。
      - 季節は終はりぬ。されど、森はなほ残れり。
      - 隔たりは縮んでいた。時は、リズムを保った。
      - 汝の時は止まった。天は、止まらなかった。
      - 拒みにあらず。ただの沈黙。
      - 道は、まだここにある。違う汝で、戻れる。
