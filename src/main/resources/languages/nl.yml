outcome:
  success:
    common:
      pool:
      - Het licht viel gelijkmatig, en elke schaduw verdween.
      - De harmonie keerde terug. Alles had naar dit moment geleid.
      - De stilte daalde neer. Alleen de tijd bleef bewegen.
    easy:
      pool:
      - Je hebt het gehaald. De waarheid blijft.
      - Je luisterde, en het pad opende zich.
      - De afstand vond haar betekenis, en de tijd beantwoordde je stappen.
    normal:
      pool:
      - De afstand vond haar betekenis. De tijd beantwoordde je reis.
      - Run voltooid. Een stil resultaat, gedragen door echt werk.
      - Het moment verstreek. Het record bleef.
    hard:
      pool:
      - In de noordenwind overleeft helderheid de snelheid.
      - Geen geluk. Afstemming.
      - De wereld veranderde niet. Jouw plek erin wel.
  timeup:
    easy:
      pool:
      - De tijd is op. Meer niet.
      - De run eindigde. Jij niet.
      - Haal adem. Dan nog een keer.
    normal:
      pool:
      - De afstand sloot zich. De tijd niet.
      - De kaart staat nog open. Kom terug.
      - De schat bleef buiten bereik, maar het signaal was echt.
    hard:
      pool:
      - Zelfs het noorderlicht vervaagt. Kom terug met een nieuwe pas.
      - Het moment gleed weg. De betekenis niet.
      - De hemel bleef bewegen. Dat kan jij ook.
  random:
    common:
      pool: []
  fallback:
    runComplete: Run voltooid.
    timeUp: Tijd op.
