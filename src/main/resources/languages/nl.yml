outcome:
  notice:
    timeUpGameOver: De tijd is om. Het spel is voorbij.
    retryGuide: Probeer het opnieuw via een andere route.
  success:
    common:
      pool: []
    easy:
      pool:
      - 'Je hebt het gehaald.

        De waarheid blijft overeind.'
      - 'Al was het maar een kleine stap,

        je bent blijven staan.'
      - 'Je hebt geluisterd.

        Toen ging het pad voor je open.'
      - '> Je bent tot hier gekomen.

        >

        > De regels waren eenvoudig —

        >

        > de keuze was aan jou.'
      - '> De afstand kreeg betekenis.

        >

        > En de tijd gaf antwoord op je voetstappen.'
      - '> Niet alles blijft voorgoed schitteren.

        >

        > Deze ene seconde wel.'
      - 'Het licht zakte zacht neer,

        en elke schaduw week terug.'
      - 'De stilte viel over de lucht.

        Alles keerde terug naar zijn plaats.'
      - 'Een korte stilte.

        De wereld haalde weer adem.'
      - 'Het spoor staat diep in het zand gegrift —

        buiten bereik van de luchtstroom.'
      - 'Het evenwicht werd hersteld.

        Alles leidde naar dit ogenblik.'
      - 'De tijd gleed zwijgend voorbij,

        veilig opgeborgen in een hoek van het geheugen.'
      - 'De hemel verschoot van kleur,

        en één verhaal kwam tot een einde.'
      - 'De golven kwamen tot rust,

        en de zee verborg haar diepte opnieuw.'
      - 'De voetstappen vielen stil,

        en alleen de plek bleef over.'
      - 'Overwinning en nederlaag —

        uiteindelijk zijn het slechts zandkorrels.'
      - 'De weg gaat verder — of eindigt hier.

        Hoe dan ook rust hij op dezelfde aarde.'
    normal:
      pool:
      - 'De afstand heeft eindelijk betekenis gekregen.

        De tijd gaf antwoord op je reis.'
      - 'De tijd is om.

        Maar hier eindigt niet alles.'
      - 'De as is gevonden.

        De wereld hield haar beweging in.'
      - 'Het glas hield zijn adem in,

        en jij bleef overeind.'
      - 'Onder de stille hemel

        wankelde je geest niet.'
      - 'Weinig dingen schitteren voorgoed.

        Deze ene seconde wel.'
      - 'Je trok over kwetsbare aarde

        zonder de horizon kwijt te raken.'
      - 'Het ogenblik is voorbij.

        Wat blijft, blijft.'
      - 'Geluk vervaagt snel.

        Orde houdt stand.'
      - 'De hemel kent geen pauze in zijn eindeloze kring,

        en jij bent ook niet gestopt.'
      - 'Je hebt het midden bereikt.

        De wereld stond stil.'
      - 'Eindelijk ben je hier.

        De waarheid houdt stand.'
      - 'Je bent tot het einde gegaan.

        Onthoud dit: jij koos dit pad. Niemand anders.'
      - 'De tijd gleed de stilte in

        en vond zijn plaats diep in het geheugen.'
      - 'Terwijl de hemel van kleur veranderde,

        kwam het verhaal tot een einde.'
      - 'De wateren kwamen tot rust,

        en de hemel hulde de afgrond opnieuw in sluier.'
      - 'De voetstappen verstomden,

        en alleen de plek bleef over.'
      - 'Het licht zakte zacht neer,

        en elke schaduw week terug.'
      - 'De stilte viel over de lucht.

        Alles keerde terug naar zijn plaats.'
      - 'Een korte stilte.

        De wereld haalde weer adem.'
      - 'Het spoor staat diep in het zand gegrift —

        buiten bereik van de luchtstroom.'
      - 'Het evenwicht werd hersteld.

        Alles leidde naar dit ogenblik.'
      - 'Run voltooid.

        Helder. Gevonden.

        Dat is genoeg.'
      - 'Run voltooid.

        Het pad hield stand.

        Jij ook.'
      - 'De hemel bleef in beweging.

        Jij kunt ook verder.'
      - 'Run voltooid.

        Een stille uitkomst.

        Het gewicht van echt werk.'
      - 'Je liep alleen het pad

        dat de wereld voor je had neergelegd.'
      - 'De grond gaf niet mee.

        Hij vertrouwde op je stappen.'
      - 'Dit ogenblik voegde zich

        naar het oude ritme van de sterren.'
      - 'Je hebt niets meegenomen.

        Je hebt iets begrepen.'
      - 'Je hebt niets voor jezelf gewonnen.

        Je zag alleen de waarheid zoals die was.'
      - 'Je hebt deze plek niet veroverd.

        Je hoorde hier thuis.'
      - 'Je liep over een weg

        die ouder is dan de herinnering zelf.'
      - 'De aarde verzette zich niet.

        Ze herkende je.'
      - 'Dit ogenblik voegde zich

        naar de stilte van de sterren.'
    hard:
      pool:
      - 'In de noordenlucht

        houdt helderheid langer stand dan snelheid.'
      - 'Het midden is gevonden.

        De wereld kon tot rust komen.'
      - 'De sterren zwijgen.

        Jouw spoor spreekt voor je.'
      - 'Het resultaat bleef.

        De positie veranderde.'
      - 'Tussen ijs en glas

        koos je voor beheersing.'
      - 'De golven vielen stil,

        en de zee nam haar verborgen diepte terug.'
      - 'Er wachten nog andere schatten.

        De volgende keer: een ander pad.'
      - 'De hemel veranderde niet.

        Jij wel.'
      - 'Het ogenblik ging voorbij.

        Wat overbleef, was orde.'
      - 'De winter is eerlijk.

        Jouw run was dat ook.'
      - 'De sterren stonden heel even op één lijn.

        Jij merkte het op.'
      - 'De afstand sloot zich.

        De tijd niet.'
      - 'De regels van de wereld bleven vast.

        En het teken van mogelijkheid was echt.'
      - 'Het pad sloot zich in stilte.

        Jij was er al doorheen.'
      - 'Wat bevroren leek,

        bleek alleen te wachten.'
      - 'Geen heldere weg blijft voorgoed open.

        Toch vond jij hem.'
      - 'De hemel gaf geen antwoord.

        De grond deed dat wel.'
      - 'De stilte daarna

        woog zwaarder dan het geluid.'
      - 'Je liep waar de kou niet loog.

        En toch ging je verder.'
      - 'Niet de snelheid bleef over.

        Alleen de richting.'
      - 'De wereld vroeg om precisie.

        Jij antwoordde met stappen.'
      - 'Het glas brak niet.

        Jij ook niet.'
      - 'De run eindigde.

        De betekenis bleef.'
      - 'Wat je bereikte, maakte geen lawaai.

        Het bleef gewoon staan.'
      - 'De sterren noteerden niets.

        Toch is het gebeurd.'
      - 'Je koos geen makkelijke weg.

        Je koos de echte.'
      - 'Het spoor achter je werd koud.

        Maar het verdween niet.'
      - 'De hemel zweeg.

        De aarde herinnerde zich.'
      - 'Je bereikte de rand van de stilte

        zonder je naam te verliezen.'
      - 'Niet alles wat standhoudt, schittert.

        Sommige dingen blijven gewoon bestaan.'
      - 'De afstand boog niet.

        Jij wel — precies genoeg.'
      - 'Aan het einde van het harde pad

        bleef alleen helderheid over.'
  timeup:
    easy:
      pool:
      - 'De tijd is op.

        Maar je stappen zijn niet verdwenen.'
      - 'Je was niet te laat.

        Je was onderweg.'
      - 'Het pad sloot zich zacht.

        Toch bleef er iets achter.'
      - 'De wereld wachtte niet.

        Maar je leerde haar tempo kennen.'
      - 'Je hebt niet gefaald.

        Je hebt afstand leren kennen.'
      - 'Ook een afgebroken run

        laat een spoor na.'
      - 'De luchtstroom nam de tijd mee.

        Maar niet alles ging verloren.'
      - 'De schat bleef liggen.

        De ervaring niet.'
      - 'Niet elke deur blijft open.

        Sommige leren je waar je stond.'
      - 'Vandaag stopt hier.

        De weg zelf niet.'
      - 'Je handen waren leeg.

        Maar je blik was scherper.'
      - 'De klok won.

        Maar niet alles verloor.'
      - 'Wat niet werd gehaald,

        kan nog richting worden.'
      - 'De stilte was geen einde.

        Het was een pauze.'
      - 'De afstand bleef staan.

        Jij nu ook.'
      - 'De volgende keer weet je

        waar de grond anders aanvoelt.'
    normal:
      pool:
      - 'De tijd liep af.

        Maar de betekenis bleef in beweging.'
      - De run eindigde voordat het pad dat deed.
      - 'Je bereikte de schat niet.

        Toch bereikte iets jou.'
      - 'De hemel werd donkerder.

        De richting werd duidelijker.'
      - 'Niet elke poging eindigt met goud.

        Sommige eindigen met inzicht.'
      - 'De klok sloot de deur.

        De weg bleef in je achter.'
      - 'Je stappen kwamen tekort.

        Maar ze waren echt.'
      - 'De wereld gaf geen korting.

        Ze gaf je een kaart.'
      - 'De afstand bleef.

        Maar nu heeft ze een naam.'
      - 'De run viel stil.

        Het leren niet.'
      - 'Je verloor tijd.

        Niet de mogelijkheid.'
      - 'Wat vandaag gesloten werd,

        kan morgen herkenbaar zijn.'
      - 'De grond onder je wist

        hoe ver je was gekomen.'
      - 'Geen schat.

        Wel spoor.

        Wel richting.'
      - 'De klok was streng.

        De weg was eerlijk.'
      - 'Je eindigde vóór het doel.

        Maar niet vóór het inzicht.'
      - 'Het glas bleef koud.

        Je blik werd scherper.'
      - 'De sterren zwegen.

        Toch wezen ze iets aan.'
      - 'De stilte na mislukking

        kan een kaart worden.'
      - 'De tijd nam het resultaat.

        Niet de betekenis.'
    hard:
      pool:
      - 'De harde weg sloot zich.

        Je stond er nog.'
      - 'De tijd was sneller.

        Maar niet dieper.'
      - 'Je bereikte het einde niet.

        Toch werd je getest.'
      - 'De winter gaf niets cadeau.

        Dat was zijn waarheid.'
      - 'Het glas hield stand.

        Jij bijna ook.'
      - 'Niet elke run wordt voltooid.

        Sommige laten zien waar je breekt.'
      - 'De sterren bleven koud.

        Maar je spoor was warm genoeg.'
      - 'De afstand won vandaag.

        Maar ze moest je wel meten.'
      - 'Het pad vroeg meer

        dan de tijd kon geven.'
      - 'Je verloor niet alleen.

        Je zag de vorm van de uitdaging.'
      - 'De stilte kwam vroeg.

        Toch was ze niet leeg.'
      - 'Wat niet werd bereikt,

        bleef zichtbaar.'
      - 'De wereld sloot zich.

        Je richting bleef open.'
      - 'De stilte telde elke stap.

        Ook de laatste.'
      - 'De klok was hard.

        Maar de grond was eerlijk.'
      - 'De afstand bleef zwaar.

        Maar ze toonde haar waarheid.'
      - 'Je kwam tekort.

        Niet omdat je niets was,

        maar omdat het pad echt was.'
      - 'Geen verkorte weg.

        Alleen leren.'
      - 'De hemel gaf geen teken.

        De fout deed dat wel.'
      - 'De run eindigde.

        De analyse begon.'
      - 'De kou won dit ogenblik.

        Niet het geheel.'
      - 'Soms is verliezen

        de eerste vorm van precisie.'
      - 'De schat bleef buiten bereik.

        Maar de kaart werd scherper.'
      - 'De harde weg spaart niemand.

        Daarom zegt hij de waarheid.'
      - 'Je had meer tijd nodig.

        Of een andere lijn.'
      - 'Het einde kwam vroeg.

        De les kwam precies op tijd.'
      - 'De sterren veranderden niet.

        Jij wel een beetje.'
      - 'De grond gaf antwoord

        op elke verkeerde stap.'
      - 'Niet voltooid.

        Niet vergeten.'
      - 'De klok sloot de scène.

        Niet het pad.'
      - 'Wat vandaag brak,

        kan morgen structuur worden.'
      - 'De afstand leerde je

        waar je nog vrij kunt worden.'
      - 'Het harde pad vroeg stilte.

        Jij bracht beweging.'
      - 'De run viel weg.

        Het inzicht bleef staan.'
      - 'De stilte sloot het toneel.

        Maar niet de weg.'
      - 'De kou schreef niets uit.

        Ze onderstreepte alleen.'
      - 'Vandaag was geen overwinning.

        Maar ook geen leegte.'
      - 'Het doel bleef ver.

        De volgende stap werd duidelijker.'
