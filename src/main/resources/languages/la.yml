outcome:
  success:
    common:
      pool:
      - Lux aequaliter cecidit et umbrae omnes evanuerunt.
      - Concordia rediit. Omnia ad hoc momentum ducebant.
      - Silentium descendit. Solum tempus movebatur.
    easy:
      pool:
      - Pervenisti. Veritas manet.
      - Auscultavisti et via aperta est.
      - Spatium sensum invenit et tempus gressibus tuis respondit.
    normal:
      pool:
      - Spatium suum sensum invenit. Tempus itineri tuo respondit.
      - Cursus perfectus. Tranquillum exitum, labore vero sustentatum.
      - Momentum praeteriit. Recordum mansit.
    hard:
      pool:
      - In vento septentrionali claritas celeritatem superat.
      - Non fortuna. Coordinatio.
      - Mundus non mutatus est. Locus tuus in eo mutatus est.
  timeup:
    easy:
      pool:
      - Tempus exhauriit. Nihil aliud.
      - Cursus finitus est. Tu non.
      - Respira. Iterum.
    normal:
      pool:
      - Spatium contractum est. Tempus non.
      - Mappa adhuc aperta est. Redi.
      - Thesaurus inaccessibilis mansit, sed signum verum erat.
    hard:
      pool:
      - Etiam aurora borealis evanescit. Redi novo gradu.
      - Momentum elapsum est. Sensus non.
      - Caelum moveri perrexit. Tu quoque potes.
  random:
    common:
      pool: []
