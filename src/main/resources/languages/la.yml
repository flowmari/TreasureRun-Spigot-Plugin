outcome:
  notice:
    timeUpGameOver: Tempus finitum est. Ludus peractus est.
    retryGuide: Iterum tenta per aliam viam.
  success:
    common:
      pool: []
    easy:
      pool:
      - 'Pervenisti.

        Veritas tamen manet.'
      - 'Etiamsi parvus tantum gradus fuit,

        tamen locum tenuisti.'
      - 'Audisti —

        et via patefacta est.'
      - '> Huc pervenisti.

        >

        > Regulae simplices erant —

        >

        > electio penes te erat.'
      - '> Distantia sensum invenit.

        >

        > Tempus vestigiis tuis respondit.'
      - '> Non omne lumen perpetuo fulget.

        >

        > Sed hoc momentum fulsit.'
      - 'Lux placide cecidit,

        et umbrae omnes recesserunt.'
      - 'Ventus conticuit.

        Omnia in sedem suam redierunt.'
      - 'Momentum silentii.

        Mundus rursus spiritum composuit.'
      - 'Vestigium alte in arena impressum est —

        quo ventus iam non pervenit.'
      - 'Concordia restituta est.

        Omnia ad hoc ipsum momentum duxerant.'
      - 'Tempus tacite praeterlapsum est,

        in angulo memoriae reconditum.'
      - 'Caelum colorem vertit,

        et una fabula ad finem perducta est.'
      - 'Fluctus placati sunt,

        et mare profundum suum iterum texit.'
      - 'Vestigia constiterunt,

        et solus locus mansit.'
      - 'Victoria cladesque —

        ad extremum grana arenae tantum sunt.'
      - 'Via pergitur — aut hic desinit.

        Utroque modo in eadem terra iacet.'
    normal:
      pool:
      - 'Distantia tandem sensum invenit.

        Tempus itineri tuo respondit.'
      - 'Tempus exactum est.

        Sed non omnia finita sunt.'
      - 'Axis inventus est.

        Mundus motum suum continuit.'
      - 'Vitrum spiritum continuit,

        tu vero locum tenuisti.'
      - 'Sub caelo immobili,

        animum non dimisisti.'
      - 'Pauca diu fulgent.

        Sed hoc momentum clarum fuit.'
      - 'Per fragilem terram transisti,

        nec conspectum amisisti.'
      - 'Momentum praeteriit.

        Quod mansit, manet.'
      - 'Fortuna cito marcescit.

        Ordo manet.'
      - 'Caelum in circulo infinito moram nescit,

        neque tu constitisti.'
      - 'Ad centrum pervenisti.

        Mundus constitit.'
      - 'Tandem hic es.

        Veritas firma manet.'
      - 'Usque ad finem pervenisti.

        Memento: hanc viam tu elegisti, non alius.'
      - 'Tempus in silentium delapsum est,

        et in profundo animi locum invenit.'
      - 'Dum caelum colorem vertebat,

        fabula ad exitum suum pervenit.'
      - 'Aquae placatae sunt,

        et caelum abyssum suam iterum velavit.'
      - 'Vestigia siluerunt,

        et solus locus mansit.'
      - 'Lux placide cecidit,

        et umbrae omnes recesserunt.'
      - 'Ventus conticuit.

        Omnia in sedem suam redierunt.'
      - 'Momentum silentii.

        Mundus rursus spiritum composuit.'
      - 'Vestigium alte in arena impressum est —

        quo ventus iam non pervenit.'
      - 'Concordia restituta est.

        Omnia ad hoc ipsum momentum duxerant.'
      - 'Cursus perfectus est.

        Clarum. Inventum.

        Satis est.'
      - 'Cursus perfectus est.

        Via sustinuit.

        Tu quoque.'
      - 'Caelum moveri perrexit.

        Tu quoque potes.'
      - 'Cursus perfectus est.

        Quietus eventus.

        Pondus veri laboris.'
      - 'Viam tantum ambulasti

        quam mundus ante te straverat.'
      - 'Terra non cessit.

        Vestigiis tuis credidit.'
      - 'Hoc momentum congruit

        antiquo siderum numero.'
      - 'Nihil abstulisti.

        Aliquid intellexisti.'
      - 'Nihil lucratus es.

        Veritatem tantum vidisti, qualis erat.'
      - 'Hunc locum non occupasti.

        Hic pertinere videbaris.'
      - 'Viam ambulasti

        ipsa memoria antiquiorem.'
      - 'Terra non restitit.

        Te agnovit.'
      - 'Hoc momentum congruit

        silentio siderum.'
    hard:
      pool:
      - 'In vento septentrionali,

        claritas velocitatem superat.'
      - 'Centrum inventum est.

        Mundus quievit.'
      - 'Sidera silent.

        Tabula tua loquitur.'
      - 'Eventus mansit.

        Locus mutatus est.'
      - 'Inter glaciem et vitrum,

        imperium elegisti.'
      - 'Fluctus conticuerunt,

        et mare profunda sua recepit.'
      - 'Thesauri quidam adhuc exspectant.

        Proxima vice alia via.'
      - 'Caelum non mutatum est.

        Tu mutatus es.'
      - 'Momentum praeteriit.

        Quod mansit, ordo fuit.'
      - 'Hiems honesta est.

        Sic et cursus tuus.'
      - 'Sidera paulisper congruerunt.

        Tu animadvertisti.'
      - 'Distantia clausa est.

        Tempus non.'
      - 'Regulae mundi firmae steterunt.

        Et signum possibilitatis verum fuit.'
      - 'Via tacite clausa est.

        Tu iam transieratis.'
      - 'Nihil mutatum est.

        Locus tuus tantum mutatus est.'
      - 'Frigus acre fuit,

        sed iudicium tuum non obscuratum est.'
      - 'Momentum praeteriit.

        Tabula manet.'
      - 'Exitus non mutatus est.

        Tamen processisti.'
      - 'Effectus non mutatus est.

        Sed ad gradum novum pervenisti.'
      - 'Finis idem erat.

        Sed qui ad eum pervenit mutatus erat.'
      - 'Meta eadem est —

        sed viator idem non es.'
      - 'Lux placide cecidit,

        et umbrae omnes recesserunt.'
      - 'Ventus conticuit.

        Omnia in sedem suam redierunt.'
      - 'Momentum silentii.

        Mundus rursus spiritum composuit.'
      - 'Vestigium alte in arena impressum est —

        quo ventus iam non pervenit.'
      - 'Concordia restituta est.

        Omnia ad hoc ipsum momentum duxerant.'
      - 'Tempus tacite praeterlapsum est,

        in angulo memoriae reconditum.'
      - 'Caelum colorem vertit,

        et una fabula ad finem perducta est.'
      - 'Fluctus placati sunt,

        et mare profundum suum iterum texit.'
      - 'Vestigia constiterunt,

        et solus locus mansit.'
      - 'Victoria cladesque —

        ad extremum grana arenae tantum sunt.'
      - 'Via pergitur — aut hic desinit.

        Utroque modo in eadem terra iacet.'
  timeup:
    easy:
      pool:
      - 'Tempus effluxit.

        Nihil aliud.'
      - 'Thesaurus exspectare potest.

        Tu quoque.'
      - 'Finis nondum adest.

        Hac vice tantum substitisti.'
      - 'Hoc satis est nunc.

        Ad proximum gradum.'
      - 'Adhuc hic es.

        Id ipsum valet.'
      - 'Cursus finitus est.

        Tu non.'
      - 'TEMPUS EXACTUM EST.

        Cursus finitus est.

        Tu non.'
      - 'TEMPUS EXACTUM EST.

        Regulae non mutantur.

        Iterum.'
      - 'TEMPUS EXACTUM EST.

        Tam prope fuisse verum est.'
      - 'Sol occidit,

        et umbra mundum iterum texit.'
      - 'Ultima grana arenae ceciderunt,

        et fabula tacite clausa est.'
      - 'Ventus pertransiit,

        et vestigia sine signo delevit.'
      - 'Aestus rediit,

        et quod ibi fuerat mari redditum est.'
      - 'Silentium.

        Tempus solum transiit.'
      - 'Victoria cladesque —

        ad extremum grana arenae tantum sunt.'
      - 'Via pergitur — aut hic desinit.

        Utroque modo in eadem terra iacet.'
    normal:
      pool:
      - 'Distantia clausa est.

        Tempus non.'
      - 'Mundus regulas suas servavit.

        Tu limen tetigisti.'
      - 'Non pervenisti.

        Sed signum verum fuit.'
      - 'Thesauri quidam adhuc exspectant.

        Aliam viam temptemus.'
      - 'Eventus mansit.

        Locus mutatus est.'
      - 'Tempus defecit.

        Via tamen mansit.'
      - 'Sub caelo frigido,

        spes adhuc tenuis fulsit.'
      - 'Cursus cessavit,

        sed memoria non cessavit.'
      - 'Quod petebas, remotum mansit.

        Sed via iam nota est.'
      - 'Ultimus gradus nondum venit.

        Proximus tamen venire potest.'
      - 'Ventus vestigia abstulit,

        sed non conatum.'
      - 'Mundus tacuit.

        Responsum adhuc exspectat.'
      - 'Nondum.

        Sed nondum non est numquam.'
      - 'Signum paene attigisti.

        Tempus prius cecidit.'
      - 'Finis venit,

        sed sensus mansit.'
      - 'In arena clausum est hoc iter.

        In memoria apertum manet.'
      - 'Silentium cecidit.

        Lux tamen paulum mansit.'
      - 'Cursus interruptus est.

        Voluntas non.'
      - 'Porta clausa est.

        Sed clavis nondum perdita est.'
      - 'Tempus hac vice vicit.

        Tu tamen redire potes.'
    hard:
      pool:
      - 'Tempus te praevenit.

        Sed tu retro non cecidisti.'
      - 'Glacies mansit.

        Tuum quoque vestigium.'
      - 'Distantia paene victa erat.

        Tempus durius fuit.'
      - 'In ipso limite stetisti.

        Non satis fuit — sed verum fuit.'
      - 'Sidera nihil promiserunt.

        Tamen ambulasti.'
      - 'Ventus durus fuit.

        Animus tuus durior.'
      - 'Cursus fractus est,

        sed via intellecta est.'
      - 'Non omnia clausa sunt.

        Hoc iter tantum.'
      - 'Mundus nihil remisit.

        Tu tamen accessisti.'
      - 'Ultimum momentum elapsum est.

        Sed labor manet.'
      - 'Nihil facile datum est.

        Nihil frustra factum est.'
      - 'Finis acer fuit.

        Sed oculi tui aperti manserunt.'
      - 'Frigus silentio respondit.

        Tu gradu respondisti.'
      - 'Celeritas non suffecit.

        Claritas tamen crevit.'
      - 'Haec clades parva est.

        Disciplina maior.'
      - 'Tempus ianuam clausit.

        Memoria fenestram reliquit.'
      - 'Distantia mansit.

        Sed minor quam antea.'
      - 'Sic hac vice finitur.

        Non sic finitur via.'
      - 'Arena cecidit.

        Voluntas stetit.'
      - 'Mare recepit quod celaverat.

        Tu tamen signum vidisti.'
      - 'Caelum obscuratum est.

        Sed via iam delineata est.'
      - 'Nihil captum est.

        Sed aliquid cognitum est.'
      - 'Finis durus est.

        Durior tamen fit manus tua.'
      - 'Cursus tacuit.

        Cor non tacuit.'
      - 'Hora exacta est.

        Vestigium manet.'
      - 'Ad centrum non pervenisti.

        Sed centrum te vocavit.'
      - 'Regulae firmae steterunt.

        Tu paene intrasti.'
      - 'Ultimus sonus evanuit.

        Sed resonantia mansit.'
      - 'Tenebrae redierunt.

        Oculi tamen assuefacti sunt.'
      - 'Hoc vacuum non fuit.

        Praeparatio fuit.'
      - 'Tempus finem abstulit.

        Viam non abstulit.'
      - 'Iter hic cecidit.

        Tu nondum.'
      - 'Nondum inventum est.

        Sed propius factum est.'
      - 'Silentium diem clausit.

        Cras apertum manet.'
      - 'Non omnia statim vincuntur.

        Quaedam discuntur.'
      - 'Finis temporis.

        Non finis tui.'
      - 'In frigore et vitro,

        conatus tuus mansit.'
      - 'Iter interruptum est.

        Sed animus integer mansit.'
