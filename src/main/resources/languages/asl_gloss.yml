outcome:
  success:
    common:
      pool:
      - LIGHT FALL EVEN. SHADOW ALL DISAPPEAR.
      - HARMONY RETURN. EVERYTHING LEAD THIS MOMENT.
      - QUIET SETTLE. TIME ONLY KEEP MOVE.
    easy:
      pool:
      - YOU SUCCEED. TRUTH STAY.
      - YOU LISTEN. PATH OPEN.
      - DISTANCE FIND MEANING. TIME ANSWER YOUR STEP.
    normal:
      pool:
      - DISTANCE FIND MEANING. TIME ANSWER YOUR JOURNEY.
      - RUN FINISH. QUIET RESULT. REAL WORK BEHIND IT.
      - MOMENT PASS. RECORD STAY.
    hard:
      pool:
      - NORTH WIND. CLEAR THINKING BEAT SPEED.
      - NOT LUCK. ALIGNMENT.
      - WORLD NOT CHANGE. YOUR PLACE INSIDE CHANGE.
  timeup:
    easy:
      pool:
      - TIME FINISH. NOTHING ELSE.
      - RUN END. YOU NOT END.
      - BREATHE. THEN AGAIN.
    normal:
      pool:
      - DISTANCE SHRINK. TIME NOT SHRINK.
      - MAP STILL OPEN. COME BACK.
      - TREASURE NOT REACH. BUT SIGNAL REAL.
    hard:
      pool:
      - AURORA ALSO FADE. COME BACK. NEW STEP.
      - MOMENT SLIP AWAY. MEANING NOT.
      - SKY KEEP MOVE. YOU ALSO CAN.
  random:
    common:
      pool: []
  fallback:
    runComplete: RUN FINISH.
    timeUp: TIME UP.
