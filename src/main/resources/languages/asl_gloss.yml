        MEMORY DEEP PLACE.'
      - 'SKY COLOR CHANGE.

        STORY FINISH.'
      - 'WATER CALM.

        SKY COVER ABYSS AGAIN.'
      - 'FOOTSTEP QUIET.

        PLACE ONLY REMAIN.'
