      - 'NO TREASURE TODAY.

        BUT MEANING NOT NONE.'
      - 'COLD WIN MOMENT.

        NOT WHOLE.'
      - 'RUN END.

        QUESTION LIVE ON.'
      - 'YOU NOT LOSE SELF.

        YOU ONLY LOSE TIME.'
      - 'NORTHERN LIGHT NOT APPEAR.

        BUT DARK READABLE.'
      - 'WHAT STOP

