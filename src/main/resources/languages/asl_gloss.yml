        PATH HOLD.

        YOU TOO.'
      - 'SKY CONTINUE COURSE.

        YOU CAN CONTINUE TOO.'
      - 'RUN COMPLETE.

        QUIET RESULT.

        REAL WORK WEIGHT.'
      - 'YOU WALK PATH ONLY

        WORLD PUT BEFORE YOU.'
      - 'GROUND NOT GIVE WAY.

        IT TRUST YOUR STEP.'
      - 'THIS MOMENT JOIN

        OLD STAR RHYTHM.'
      - 'YOU TAKE NOTHING.

        YOU UNDERSTAND SOMETHING.'
      - 'YOU WIN NOTHING FOR SELF.

        YOU SEE TRUTH AS-IS.'
