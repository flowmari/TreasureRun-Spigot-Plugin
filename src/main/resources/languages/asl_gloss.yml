        NOT WHOLE STORY.'
      - 'WHAT NOT REACH

        BECOME VISIBLE STILL.'
      - 'OUTCOME HARD.

        BUT NOT EMPTY.'
      - 'TIME SHORTER THAN PATH.

        THAT NOT LIE.'
      - 'YOU NOT REACH END.

        BUT YOU ENTER DEEPER.'
      - 'PATH NOT REJECT YOU.

        IT ONLY END EARLY.'
      - 'CLARITY COME LATE.

        BUT IT COME.'
      - 'WHAT BREAK

