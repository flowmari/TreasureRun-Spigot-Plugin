        HORIZON NOT LOSE.'
      - 'MOMENT PAST.

        WHAT REMAIN, REMAIN.'
      - 'LUCK FADE FAST.

        ORDER STAY.'
      - 'SKY ENDLESS CIRCLE, NO PAUSE.

        YOU ALSO NOT STOP.'
      - 'CENTER REACH.

        WORLD STAND STILL.'
      - 'FINALLY YOU HERE.

        TRUTH STAND FIRM.'
      - 'YOU GO UNTIL END.

        REMEMBER: PATH CHOOSE YOU. NO ONE ELSE.'
