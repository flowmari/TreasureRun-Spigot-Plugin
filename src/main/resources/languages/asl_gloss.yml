    retryGuide: TRY AGAIN DIFFERENT ROUTE.
  success:
    common:
      pool: []
    easy:
      pool:
      - 'YOU FINISH.

        TRUTH STAY.'
      - 'SMALL STEP, OK.

        YOU STAND STRONG.'
      - 'YOU LISTEN.

        PATH OPEN.'
      - '> YOU ARRIVE HERE.

        >

        > RULE SIMPLE —

        >

        > CHOICE YOURS.'
      - '> DISTANCE BECOME MEANING.

        >

        > TIME ANSWER YOUR FOOTSTEP.'
      - '> EVERYTHING SHINE FOREVER? NO.

        >

        > THIS MOMENT SHINE.'
      - 'LIGHT FALL SOFT.

        SHADOW DISAPPEAR.'
      - 'WIND QUIET.

        EVERYTHING RETURN PLACE.'
      - 'SILENCE MOMENT.

        WORLD BREATHE AGAIN.'
      - 'TRACK DEEP IN SAND —

        WIND CANNOT REACH.'
      - 'BALANCE RETURN.

        EVERYTHING LEAD THIS MOMENT.'
      - 'TIME PASS QUIET.

        MEMORY CORNER KEEP.'
      - 'SKY COLOR CHANGE.

        ONE STORY END.'
      - 'WAVE CALM.

        SEA HIDE DEPTH AGAIN.'
      - 'FOOTSTEP STOP.

        PLACE ONLY REMAIN.'
      - 'VICTORY, DEFEAT —

        FINALLY SAND GRAIN ONLY.'
      - 'ROAD CONTINUE — OR END HERE.

        SAME EARTH SUPPORT.'
    normal:
      pool:
      - 'DISTANCE FINALLY MEANING.

        TIME ANSWER YOUR JOURNEY.'
      - 'TIME UP.

        BUT EVERYTHING END? NO.'
      - 'AXIS FOUND.

        WORLD HOLD MOVEMENT.'
      - 'GLASS HOLD BREATH.

        YOU STAND STRONG.'
      - 'UNDER QUIET SKY,

        YOUR SPIRIT NOT SHAKE.'
      - 'FEW THINGS SHINE FOREVER.

        THIS MOMENT YES.'
      - 'YOU CROSS FRAGILE EARTH.

        HORIZON NOT LOSE.'
      - 'MOMENT PAST.

        WHAT REMAIN, REMAIN.'
      - 'LUCK FADE FAST.

        ORDER STAY.'
      - 'SKY ENDLESS CIRCLE, NO PAUSE.

        YOU ALSO NOT STOP.'
      - 'CENTER REACH.

        WORLD STAND STILL.'
      - 'FINALLY YOU HERE.

        TRUTH STAND FIRM.'
      - 'YOU GO UNTIL END.

        REMEMBER: PATH CHOOSE YOU. NO ONE ELSE.'
      - 'TIME DRIFT SILENCE.

        MEMORY DEEP PLACE.'
      - 'SKY COLOR CHANGE.

        STORY FINISH.'
      - 'WATER CALM.

        SKY COVER ABYSS AGAIN.'
      - 'FOOTSTEP QUIET.

        PLACE ONLY REMAIN.'
      - 'LIGHT FALL SOFT.

        SHADOW DISAPPEAR.'
      - 'WIND QUIET.

        EVERYTHING RETURN PLACE.'
      - 'SILENCE MOMENT.

        WORLD BREATHE AGAIN.'
      - 'TRACK DEEP IN SAND —

        WIND CANNOT REACH.'
      - 'BALANCE RETURN.

        EVERYTHING LEAD THIS MOMENT.'
      - 'RUN COMPLETE.

        CLEAR. FOUND.

        ENOUGH.'
      - 'RUN COMPLETE.

        PATH HOLD.

        YOU TOO.'
      - 'SKY CONTINUE COURSE.

        YOU CAN CONTINUE TOO.'
      - 'RUN COMPLETE.

        QUIET RESULT.

        REAL WORK WEIGHT.'
      - 'YOU WALK PATH ONLY

        WORLD PUT BEFORE YOU.'
      - 'GROUND NOT GIVE WAY.

        IT TRUST YOUR STEP.'
      - 'THIS MOMENT JOIN

        OLD STAR RHYTHM.'
      - 'YOU TAKE NOTHING.

        YOU UNDERSTAND SOMETHING.'
      - 'YOU WIN NOTHING FOR SELF.

        YOU SEE TRUTH AS-IS.'
      - 'YOU CONQUER PLACE? NO.

        YOU BELONG THERE.'
      - 'YOU WALK ROAD

        OLDER THAN MEMORY ITSELF.'
      - 'EARTH NOT RESIST.

        IT RECOGNIZE YOU.'
      - 'THIS MOMENT JOIN

        STAR SILENCE.'
    hard:
      pool:
      - 'NORTH WIND.

        CLARITY LAST LONGER THAN SPEED.'
      - 'CENTER FOUND.

        WORLD CAN REST.'
      - 'STARS SILENT.

        YOUR TRACK SPEAK FOR YOU.'
      - 'RESULT REMAIN.

        POSITION CHANGE.'
      - 'BETWEEN ICE AND GLASS,

        YOU CHOOSE CONTROL.'
      - 'WAVE QUIET.

        SEA TAKE HIDDEN DEPTH BACK.'
      - 'OTHER TREASURE WAIT.

        NEXT TIME: DIFFERENT PATH.'
      - 'SKY NOT CHANGE.

        YOU CHANGE.'
      - 'MOMENT PASS.

        ORDER REMAIN.'
      - 'WINTER HONEST.

        YOUR RUN ALSO.'
      - 'STARS ALIGN BRIEF.

        YOU NOTICE.'
      - 'DISTANCE CLOSE.

        TIME NOT.'
      - 'WORLD RULE STAND FIRM.

        POSSIBILITY SIGN REAL.'
      - 'PATH CLOSE QUIET.

        YOU ALREADY THROUGH.'
      - 'NOTHING CHANGE.

        ONLY YOUR POSITION.'
      - 'NOT LUCK.

        ALIGNMENT.'
      - 'MOMENT PASS.

        RECORD REMAIN.'
      - 'RESULT NOT CHANGE.

        STILL YOU MOVE FORWARD.'
      - 'OUTCOME NOT CHANGE.

        BUT YOU REACH NEW LEVEL.'
      - 'ENDING SAME.

        PERSON WHO REACH END CHANGE.'
      - 'DESTINATION SAME —

        TRAVELER YOU NOT SAME.'
      - 'SOUND STOP.

        MEANING REMAIN.'
      - 'YOU NOT FASTEST.

        YOU MOST CLEAR.'
      - 'WHAT SEEM FROZEN

        ONLY WAIT.'
      - 'NORTH GIVE NOTHING.

        YOU ALSO NOT.'
      - 'GLASS NOT BREAK.

        IT REMEMBER PRESSURE.'
      - 'PATH ASK VICTORY? NO.

        PATH ASK PRECISION.'
      - 'YOU COME WITH CALM,

        NOT NOISE.'
      - 'WHAT REMAIN

        NOT LUCK, STRUCTURE.'
      - 'EVERYTHING ENDURE SHINE? NO.

        SOME THINGS SIMPLY STAY.'
      - 'IN COLD, FORM BECOME VISIBLE.

        YOU FOLLOW.'
      - 'THIS RESULT NOT ACCIDENT.

        YOUR STEPS READ IT.'
  timeup:
    easy:
      pool:
      - 'TIME OUT.

        GAME OVER.'
      - 'TRY AGAIN.

        DIFFERENT ROUTE.'
      - 'TIME OUT.

        BUT PATH REMEMBER YOUR STEP.'
      - 'TODAY NOT EVERYTHING REACH.

        BUT SOMETHING BECOME CLEAR.'
      - 'WIND TAKE TIME.

        BUT NOT EVERYTHING LOST.'
      - 'GOLD STILL WAIT.

        YOU STILL CLOSER.'
      - 'PATH CLOSE QUIET.

        IT NOT DISAPPEAR.'
      - 'YOU NOT STOP BY WILL.

        TIME STOP YOU.'
      - 'HORIZON STILL FAR.

        BUT YOU SEE IT.'
      - 'SOUND FADE.

        FOOTSTEP REMAIN.'
      - 'NOT VICTORY.

        NOT EMPTY EITHER.'
      - 'WHAT NOT FOUND

        MAYBE STILL WAIT.'
      - 'SAND ACCEPT END.

        MEMORY ACCEPT PATH.'
      - 'YOU NOT LOSE EVERYTHING.

        YOU ARRIVE HERE.'
      - SOME PATH END BEFORE FULL OPEN.
      - 'THIS NOT FINAL JUDGMENT.

        ONLY THIS RUN END.'
    normal:
      pool:
      - 'TIME CLOSE DOOR.

        PATH NOT FORGET YOU.'
      - 'TRY AGAIN.

        DIFFERENT PATH MAY ANSWER.'
      - 'TIME OUT.

        JOURNEY NOT NOTHING.'
      - 'TREASURE NOT REACH.

        BUT YOU LEARN PATH SHAPE.'
      - 'PATH LONGER THAN MOMENT.

        THAT HAPPEN.'
      - 'SKY CONTINUE.

        YOU CAN ALSO.'
      - 'NOT EVERY TRY END GOLD.

        SOME END UNDERSTANDING.'
      - 'GLASS KEEP LIGHT.

        EVEN WHEN TIME BREAK.'
      - 'FOOTSTEP NOT REACH END.

        STILL REAL.'
      - 'WHAT CLOSE TODAY

        CAN OPEN TOMORROW.'
      - 'LUCK NOT ARRIVE IN TIME.

        BUT RULE STILL LEARNABLE.'
      - 'THIS NOT DEFEAT OF YOU.

        ONLY RUN END.'
      - 'YOU STAND INSIDE UNCERTAINTY

        LONGER THAN BEFORE.'
      - 'WHAT CLOSE TODAY

        CAN BECOME FAMILIAR TOMORROW.'
      - 'TIME WIN THIS ROUND.

        NOT WHOLE WORK.'
      - 'PATH NOT ANSWER YET.

        BUT NOT FULL SILENT.'
      - 'YOU DID NOT GO FOR NOTHING.

        EARTH ACCEPT STEP.'
      - 'NOT FINISHED.

        ONLY UNFINISHED.'
      - 'STARS NOT MOVE.

        BUT YOU SEE CLEARER.'
      - 'MISSING THING TIME.

        NOT NECESSARILY ABILITY.'
    hard:
      pool:
      - 'TREASURE WAIT.

        YOU LEARN WAITING.'
      - 'THIS RUN BECOME MAP.

        NEXT CAN BECOME PATH.'
      - 'TIME CLOSE CIRCLE.

