      - 'EARTH NOT RESIST.

        IT RECOGNIZE YOU.'
      - 'THIS MOMENT JOIN

        STAR SILENCE.'
    hard:
      pool:
      - 'NORTH WIND.

        CLARITY LAST LONGER THAN SPEED.'
      - 'CENTER FOUND.

        WORLD CAN REST.'
      - 'STARS SILENT.

        YOUR TRACK SPEAK FOR YOU.'
      - 'RESULT REMAIN.

        POSITION CHANGE.'
      - 'BETWEEN ICE AND GLASS,

        YOU CHOOSE CONTROL.'
      - 'WAVE QUIET.

        SEA TAKE HIDDEN DEPTH BACK.'
      - 'OTHER TREASURE WAIT.

        NEXT TIME: DIFFERENT PATH.'
      - 'SKY NOT CHANGE.

        YOU CHANGE.'
      - 'MOMENT PASS.

        ORDER REMAIN.'
      - 'WINTER HONEST.

        YOUR RUN ALSO.'
      - 'STARS ALIGN BRIEF.

        YOU NOTICE.'
      - 'DISTANCE CLOSE.

        TIME NOT.'
