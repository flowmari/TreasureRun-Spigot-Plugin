      - '光退。

        然目已見之。'
      - '此刻止，

        後刻可續。'
      - '毋急。

        道不為急者開。'
      - '今日未竟，

        可為明日之始。'
      - '鐘止。

        心未止。'
    normal:
      pool:
      - '距離已減。

        時不相從。'
      - '圖猶開。

        可復來。'
      - '寶尚遠。

        然其信為真。'
      - '時既落，

        道猶未合。'
      - '爾幾近矣。

        近亦可證。'
      - '風先至，

        人未及。'
      - '此敗非終。

        乃路之一節。'
      - '目已知其方。

        足猶須再行。'
      - '靜默。

        唯時過耳。'
      - '勝負之事，

        終同沙粒。'
      - '今日不得，

        未必明日不得。'
      - '天不為一刻止，

        爾亦勿止。'
      - '未取其寶，

        已識其重。'
      - '地猶在。

        道猶在。'
      - '時奪其果，

        不奪其義。'
      - '所失者一局，

        非其道也。'
      - '鐘聲既盡，

        餘音猶存。'
      - '風掩足跡，

        不掩其向。'
      - '復來之日，

        此地將識爾。'
      - '止於此，

        非終於此。'
    hard:
      pool:
      - '極光亦淡。

        持一新步而來。'
      - '一刻已逝。

        其義未逝。'
      - '天猶運行。

        爾亦可然。'
      - '寒風不問願。

        唯問足猶行否。'
      - '時如冰裂。

        其聲已至。'
      - '未至中心，

        中心已知爾來。'
      - '難處不赦人。

        亦不欺人。'
      - '今失其寶，

        猶得其向。'
      - '雪覆其路，

        非滅其路。'
      - '未竟之局，

        可為明日之證。'
      - '天色已冷。

        心勿冷。'
      - '風奪其聲，

        不奪其志。'
      - '未入其門，

        已至門前。'
      - '冰猶在。

        足亦可復至。'
      - '黑暗合。

        然光嘗在其中。'
      - '時不待人。

        人可復行。'
      - '未得者，

        未必永不得。'
      - '敗非辱。

        亂乃辱。'
      - '今日止步，

        非永止也。'
      - '星位已過，

        天圖猶在。'
      - '路狹且寒，

        故一步有重。'
      - '風雪急。

        爾猶前進。'
      - '此局不仁，

        亦不虛。'
      - '未勝。

        然非空也。'
      - '終聲已鳴。

        其意猶留。'
      - '寶在遠。

        爾亦猶在。'
      - '若復來，

        此寒非初見也。'
      - '失其時，

        未失其道。'
      - '沉默既下。

        爾猶可起。'
      - '冰光既遠，

        記憶猶近。'
      - '此敗有形，

        其學無形。'
      - '爾與終點相望，

        尚未相逢。'
      - '風閉其門，

        明日可復叩。'
      - '星辰不語，

        然嘗照爾。'
      - '道難。

        故足跡有價。'
      - '時盡於此。

        志可不盡。'
      - '今日寒勝。

        來日未必。'
      - '局止。

        人未止。'
