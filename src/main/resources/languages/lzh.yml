        風亦不能及。'
      - '衡復。

        萬事若歸此刻。'
      - '賽既畢。

        明矣。得矣。

        足矣。'
      - '賽既畢。

        道能承之，

        爾亦承之。'
      - '天猶運行。

        爾亦可然。'
      - '賽既畢。

        靜然之果。

        實功之重。'
