outcome:
  notice:
    timeUpGameOver: 時已盡矣，戲遂終。
    retryGuide: 請更由他途，再試之。
  success:
    common:
      pool: []
    easy:
      pool:
      - '至矣。

        真猶存焉。'
      - '雖止一步，

        亦未退也。'
      - '既聞其聲，

        道乃自啟。'
      - "> 至此矣。\n> \n> 法簡而明——\n> \n> 擇在爾手。"
      - "> 遠近得義。\n> \n> 時亦應爾足音。"
      - "> 光非皆可久。\n> \n> 然此刻，實明。"
      - '光靜下，

        群影盡退。'
      - '風息。

        萬物各返其所。'
      - '俄頃寂然。

        天地復其息。'
      - '跡鐫沙中——

        風亦不能及。'
      - '衡復。

        萬事若歸此刻。'
      - '時默然而過，

        藏諸記憶之隅。'
      - '天易其色，

        一事遂終。'
      - '浪息，

        海復藏其深。'
      - '足音既止，

        唯地猶在。'
      - '勝負之事，

        終同沙粒。'
      - '道或續，或止。

        然皆載於一土。'
    normal:
      pool:
      - '遠近既得其義。

        時亦應爾行。'
      - '時盡。

        事猶未竟。'
      - '軸既得，

        天地亦止其運。'
      - '琉璃屏息，

        爾守其位。'
      - '靜天之下，

        爾心不移。'
      - '久明者寡。

        然此刻甚明。'
      - '爾履脆地，

        目不旁移。'
      - '此刻已逝。

        所存猶存。'
      - '幸易衰。

        序獨存。'
      - '天循無窮之圓而不息，

        爾亦未止。'
      - '爾至其中。

        天地為之靜。'
      - '終至於此。

        真猶堅。'
      - '爾行至終。

        記之：擇此道者爾也，非他人也。'
      - '時入沉默，

        於心深處安其所。'
      - '天變之際，

        事亦歸終。'
      - '水既平，

        天復掩其深。'
      - '足音既息，

        唯地猶存。'
      - '光靜下，

        群影盡退。'
      - '風息。

        萬物各返其所。'
      - '俄頃寂然。

        天地復其息。'
      - '跡鐫沙中——

        風亦不能及。'
      - '衡復。

        萬事若歸此刻。'
      - '賽既畢。

        明矣。得矣。

        足矣。'
      - '賽既畢。

        道能承之，

        爾亦承之。'
      - '天猶運行。

        爾亦可然。'
      - '賽既畢。

        靜然之果。

        實功之重。'
      - 爾但行天地置於前者。
      - '地不崩。

        蓋信爾足也。'
      - 此刻合星辰之古律。
      - '爾非有所取。

        乃有所悟。'
      - '爾非有所勝。

        但見真如真。'
      - '爾非據此地。

        爾本屬焉。'
      - '爾行一道，

        其古過於記憶。'
      - '地無拒意。

        以其識爾也。'
      - 此刻合星辰之靜。
    hard:
      pool:
      - '北風之中，

        明辨久於疾。'
      - '非幸也。

        向也。'
      - '世未改。

        爾位已改。'
      - '其果猶存。

        其位已移。'
      - '冰與琉璃之間，

        爾擇其制。'
      - '浪既默，

        海復收其幽深。'
      - '寶猶有待。

        他日更由別徑。'
      - '天未變。

        變者爾也。'
      - '一刻既逝。

        所餘者，序也。'
      - '冬不欺人。

        爾行亦然。'
      - '星辰一瞬得位。

        爾見之矣。'
      - '遠近既合。

        時猶未合。'
      - '世法不移。

        爾亦立焉。'
      - '爾過寒光，

        不失其準。'
      - '琉璃將裂而未裂。

        爾亦未折。'
      - '風雪無辭。

        故足跡為真。'
      - '高處無聲。

        爾猶至焉。'
      - '非疾者勝。

        不亂者至。'
      - '冰下有光。

        爾識其處。'
      - '時如刃。

        爾不避鋒。'
      - '遠處閉，

        近處開。'
      - '爾立界上，

        而界不奪爾。'
      - '天色冷然。

        心火未滅。'
      - '萬物皆輕，

        唯所擇為重。'
      - '步寡而準。

        故道開。'
      - '終局無言。

        唯位可證。'
      - '群影退，

        爾猶在前。'
      - '寒意逼近，

        爾不改向。'
      - '地記爾步，

        風不能除。'
      - '此非偶然。

        乃積行之果。'
      - '爾至難處，

        難亦讓道。'
      - '沉默之中，

        勝負已定。'
  timeup:
    easy:
      pool:
      - '時盡。

        爾未盡也。'
      - '寶可待。

        爾亦可復來。'
      - '且息一息。

        復行一步。'
      - '今暫足矣。

        更進於後。'
      - '道未閉。

        但今日止此。'
      - '火未滅。

        風已至。'
      - '足跡尚淺。

        然已印於地。'
      - '未得其寶，

        亦非空行。'
      - '時過，

        道猶存。'
      - '未至其終，

        已離其始。'
      - 沙猶記步。
      - '光退。

        然目已見之。'
      - '此刻止，

        後刻可續。'
      - '毋急。

        道不為急者開。'
      - '今日未竟，

        可為明日之始。'
      - '鐘止。

        心未止。'
    normal:
      pool:
      - '距離已減。

        時不相從。'
      - '圖猶開。

        可復來。'
      - '寶尚遠。

        然其信為真。'
      - '時既落，

        道猶未合。'
      - '爾幾近矣。

        近亦可證。'
      - '風先至，

        人未及。'
      - '此敗非終。

        乃路之一節。'
      - '目已知其方。

        足猶須再行。'
      - '靜默。

        唯時過耳。'
      - '勝負之事，

        終同沙粒。'
      - '今日不得，

        未必明日不得。'
      - '天不為一刻止，

        爾亦勿止。'
      - '未取其寶，

        已識其重。'
      - '地猶在。

        道猶在。'
      - '時奪其果，

        不奪其義。'
      - '所失者一局，

        非其道也。'
      - '鐘聲既盡，

        餘音猶存。'
      - '風掩足跡，

        不掩其向。'
      - '復來之日，

        此地將識爾。'
      - '止於此，

        非終於此。'
    hard:
      pool:
      - '極光亦淡。

        持一新步而來。'
      - '一刻已逝。

        其義未逝。'
      - '天猶運行。

        爾亦可然。'
      - '寒風不問願。

        唯問足猶行否。'
      - '時如冰裂。

        其聲已至。'
      - '未至中心，

        中心已知爾來。'
      - '難處不赦人。

        亦不欺人。'
      - '今失其寶，

        猶得其向。'
      - '雪覆其路，

        非滅其路。'
      - '未竟之局，

        可為明日之證。'
      - '天色已冷。

        心勿冷。'
      - '風奪其聲，

        不奪其志。'
      - '未入其門，

        已至門前。'
      - '冰猶在。

        足亦可復至。'
      - '黑暗合。

        然光嘗在其中。'
      - '時不待人。

        人可復行。'
      - '未得者，

        未必永不得。'
      - '敗非辱。

        亂乃辱。'
      - '今日止步，

        非永止也。'
      - '星位已過，

        天圖猶在。'
      - '路狹且寒，

        故一步有重。'
      - '風雪急。

        爾猶前進。'
      - '此局不仁，

        亦不虛。'
      - '未勝。

        然非空也。'
      - '終聲已鳴。

        其意猶留。'
      - '寶在遠。

        爾亦猶在。'
      - '若復來，

        此寒非初見也。'
      - '失其時，

        未失其道。'
      - '沉默既下。

        爾猶可起。'
      - '冰光既遠，

        記憶猶近。'
      - '此敗有形，

        其學無形。'
      - '爾與終點相望，

        尚未相逢。'
      - '風閉其門，

        明日可復叩。'
      - '星辰不語，

        然嘗照爾。'
      - '道難。

        故足跡有價。'
      - '時盡於此。

        志可不盡。'
      - '今日寒勝。

        來日未必。'
      - '局止。

        人未止。'
