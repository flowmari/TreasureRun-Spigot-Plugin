        爾猶至焉。'
      - '非疾者勝。

        不亂者至。'
      - '冰下有光。

        爾識其處。'
      - '時如刃。

        爾不避鋒。'
      - '遠處閉，

        近處開。'
      - '爾立界上，

        而界不奪爾。'
      - '天色冷然。

        心火未滅。'
      - '萬物皆輕，

        唯所擇為重。'
      - '步寡而準。

        故道開。'
      - '終局無言。

        唯位可證。'
      - '群影退，

        爾猶在前。'
      - '寒意逼近，

        爾不改向。'
      - '地記爾步，

        風不能除。'
      - '此非偶然。

        乃積行之果。'
      - '爾至難處，

        難亦讓道。'
      - '沉默之中，

        勝負已定。'
  timeup:
    easy:
      pool:
      - '時盡。

        爾未盡也。'
      - '寶可待。

        爾亦可復來。'
      - '且息一息。

        復行一步。'
      - '今暫足矣。

        更進於後。'
      - '道未閉。

        但今日止此。'
      - '火未滅。

        風已至。'
      - '足跡尚淺。

        然已印於地。'
      - '未得其寶，

        亦非空行。'
      - '時過，

        道猶存。'
      - '未至其終，

        已離其始。'
