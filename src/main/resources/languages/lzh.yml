      - '爾非有所取。

        乃有所悟。'
      - '爾非有所勝。

        但見真如真。'
      - '爾非據此地。

        爾本屬焉。'
      - '爾行一道，

        其古過於記憶。'
      - '地無拒意。

        以其識爾也。'
      - 此刻合星辰之靜。
    hard:
      pool:
      - '北風之中，

        明辨久於疾。'
      - '非幸也。

        向也。'
      - '世未改。

        爾位已改。'
      - '其果猶存。

        其位已移。'
      - '冰與琉璃之間，

        爾擇其制。'
