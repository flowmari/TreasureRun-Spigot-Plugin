  menu:
    toc:
      message: '&6===== 🌟 TreasureRun 目錄 🌟 =====

        &b1. 目標

        &f   ・在時間限制內開啟盡可能多的箱子。


        &b2. 目前難度

        &f   ・難度: &e{difficulty}


        &b3. 難度與顏色

        &f   ・簡單：紫色方塊

        &f   ・普通：綠色方塊

        &f   ・困難：藍色方塊


        &b4. 遊玩方式

        &f   ・四處奔跑，找到箱子，右鍵點擊開啟。


        &b5. 計分

        &f   ・普通寶藏: +100

        &f   ・特殊寶藏 (下界合金 / 方塊等): 獎勵！


        &b6. 結束條件

        &f   ・開啟所有箱子或時間結束 — 遊戲結束。


        &b7. 語錄收藏

        &f   ・在 SUCCESS / TIME_UP 時自動儲存。


        &b8. 我的最愛

        &f   ・用 ★ 儲存您喜愛的語錄。


        &6=================================='
