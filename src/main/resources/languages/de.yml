  menu:
    toc:
      message: '&6===== 🌟 TreasureRun-Inhaltsverzeichnis 🌟 =====

        &b1. Ziel

        &f   • Öffne innerhalb des Zeitlimits so viele Truhen wie möglich und sammle
        Punkte.


        &b2. Aktueller Schwierigkeitsgrad

        &f   • Schwierigkeit: &e{difficulty}


        &b3. Schwierigkeitsstufen & Farben

        &f   • Einsteiger      : Lila Blöcke

        &f   • Mittelstufe     : Grüne Blöcke

        &f   • Fortgeschritten : Blaue Blöcke


        &b4. Steuerung

        &f   • Laufe herum, finde Truhen und öffne sie mit Rechtsklick.


        &b5. Punkte

        &f   • Normale Schätze: +100

        &f   • Seltene Schätze (Netherit, Blöcke usw.): Extrapunkte!


        &b6. Ende

        &f   • Das Spiel endet, wenn alle Truhen geöffnet wurden oder die Zeit abläuft.


        &b7. Zitatesammlung

        &f   • Zitate werden je nach Ergebnis automatisch gespeichert.


        &b8. Favoriten

        &f   • Speichere deine Lieblingszitate mit ★.


        &6=================================='
