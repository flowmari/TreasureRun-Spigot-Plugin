    like_drifting_clouds_don_t_l_c3c258f1: Like drifting clouds,\ndon’t lose your
      flow—like a river.\n（雲が動き続けるように。川のように、流れを失わないで。）
    the_sound_was_near_the_dista_cb0928e2: The sound was near.\nThe distance was real.\nBut
      that moment can’t be saved.\n（音は近かった。距離は本物だった。でも、その瞬間は保存できない。）
    you_were_closing_in_only_tim_039e3c2b: You were closing in.\nOnly time wasn’t.\n（近づいていた。時間だけが近づかなかった。）
    the_world_held_to_its_rules__12a22071: The world held to its rules.\nYou touched
      the edge of them.\n（世界はルールを守った。あなたはその縁に触れた。）
    you_didn_t_reach_the_treasur_1d8abec0: You didn’t reach the treasure. \nBut the
      signal was real.\n（宝には届かなかった。でも合図は本物だった。）
    nothing_changed_only_your_po_9e81bf75_485: Nothing changed.\nOnly your position
      did.\n（何も変わらない。ただ、あなたの位置だけが変わった。）
    it_wasn_t_luck_alignment_281cfe32: It wasn’t luck.\nAlignment.\n（運じゃない。整いだ。）
    the_moment_slipped_away_but__6e819b84: The moment slipped away,\nbut the record
      stayed.\n（瞬間は過ぎた。記録は残る。）
    you_crossed_fragile_ground_a_2ee4dbcd: You crossed fragile ground\nand left the
      horizon unbroken.\n（脆い地面を渡った。視界（景色）を壊さずに。）
    nothing_changed_only_your_po_67b63cc8: Nothing changed.\n Only your position did.\nNot
      luck.\nAlignment.\nThe moment passed.\nThe record remains.\n
    text_6b182851: （何も変わらない。ただ、あなたの位置だけが変わった。\n運じゃない。整いだ。\n瞬間は過ぎた。記録は残る。）
    the_season_closed_the_land_r_7bdbd9a6: The season closed.\nThe land remained.\n（季節は閉じた。大地は、残っている。）
    the_path_the_path_remains_on_c1d493d2: The path The path remains.\nOnly your steps
      stopped.\n（道は、まだそこにある。あなたが歩みを止めただけ。）
    your_time_ran_out_the_sky_di_3dfe6218: Your time ran out.\nThe sky didn’t.\n（あなたの時間は終わった。空は、終わっていない。）
    it_wasn_t_rejection_only_sil_35834dbb: It wasn’t rejection.\nOnly silence.\n（拒絶ではない。ただ、沈黙だった。）
    the_world_is_still_intact_yo_13ea2af5: The world is still intact.\nYou can return—changed.\n（世界は形を保っている。変わったあなたで、戻れる。）
    the_season_ended_the_forest__8102303b: The season ended.\nThe forest remains.\n（季節は終わった。森は、残っている。）
    the_distance_was_closing_tim_e96a008a: The distance was closing.\nTime kept its
      rhythm.\n（距離は縮んでいた。時間は、リズムを保った。）
    your_time_came_to_a_halt_the_2f4d397d: Your time came to a halt.\nThe sky kept
      moving.\n（あなたの時間は止まった。空は、止まらなかった。）
    not_rejection_just_silence_e7386d1c: Not rejection\nJust silence.\n（拒絶ではない。ただの、沈黙。）
    the_path_is_still_here_you_c_7eb57bee: The path is still here.\nYou can come back—changed.\n（道は、まだここにある。違うあなたで、戻れる。）
    time_s_up_87859973: Time's up.
    perfect_equilibrium_the_scal_94a70e0d: Perfect equilibrium.\nThe scales held level.\n（等価の均衡。天秤は水平を保った。）
