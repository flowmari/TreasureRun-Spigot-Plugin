        &b1. Objetivo

        &f   ・Abra o maior número de baús dentro do limite de tempo.


        &b2. Dificuldade atual

        &f   ・Dificuldade: &e{difficulty}


        &b3. Dificuldade e cores

        &f   ・Fácil  ：Blocos roxos

        &f   ・Normal：Blocos verdes

        &f   ・Difícil：Blocos azuis


        &b4. Como jogar

        &f   ・Corra, encontre baús e clique com o botão direito para abrir.


        &b5. Pontuação

        &f   ・Tesouro normal: +100

        &f   ・Tesouro especial (Netherite / blocos etc.): bônus!


        &b6. Condições de fim

        &f   ・Abra todos os baús OU o tempo acaba — jogo encerrado.


        &b7. Coleção de Citações

        &f   ・Salvo automaticamente em SUCCESS / TIME_UP.


        &b8. Favoritos

        &f   ・Salve suas citações favoritas com ★.


        &6=================================='
