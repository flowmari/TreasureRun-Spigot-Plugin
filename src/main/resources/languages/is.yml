      - 'Leiðin svaraði ekki enn.

        En hún þagði ekki alveg.'
      - 'Þú fórst ekki til einskis.

        Jörðin tók við skrefunum.'
      - 'Ekki lokið.

        Aðeins ófullgert.'
      - 'Stjörnurnar færðust ekki.

        En þú sást skýrar.'
      - 'Það sem vantaði var tími.

        Ekki endilega geta.'
      - 'Fjársjóðurinn beið.

        Þú lærðir að bíða.'
      - 'Þetta hlaup varð að korti.

        Það næsta getur orðið leið.'
