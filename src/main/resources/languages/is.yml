outcome:
  fallback:
    runComplete: "Run complete."
    timeUp: "Time's up."
    trader: "Trade complete."
  notice:
    timeUpGameOver: Tíminn er runninn út. Leiknum er lokið.
    retryGuide: Reyndu aftur og farðu aðra leið.
  success:
    common:
      pool: []
    easy:
      pool:
      - 'Þú komst alla leið.

        Sannleikurinn stendur eftir.'
      - 'Þótt skrefið væri lítið,

        stóðstu föst.'
      - 'Þú hlustaðir.

        Og þá opnaðist leiðin.'
      - '> Þú komst hingað.

        >

        > Reglurnar voru einfaldar —

        >

        > valið var þitt.'
      - '> Fjarlægðin fékk merkingu.

        >

        > Og tíminn svaraði fótsporum þínum.'
      - '> Ekki allt skín að eilífu.

        >

        > En þetta augnablik gerði það.'
      - 'Ljósið féll mjúklega,

        og hver skuggi vék undan.'
      - 'Vindurinn þagnaði.

        Allt sneri aftur á sinn stað.'
      - 'Andartak þagnar.

        Heimurinn náði aftur andanum.'
      - 'Slóðin er grafin djúpt í sandinn —

        þangað sem vindurinn nær ekki lengur.'
      - 'Jafnvægið var endurheimt.

        Allt hafði leitt að þessu augnabliki.'
      - 'Tíminn rann hljóðlega hjá,

        geymdur í afkima minningarinnar.'
      - 'Himinninn tók nýjan lit,

        og ein saga rann sitt skeið.'
      - 'Öldurnar lægðu,

        og hafið huldi dýpi sitt á ný.'
      - 'Fótsporin þögnuðu,

        og staðurinn einn stóð eftir.'
      - 'Sigur og ósigur —

        að lokum eru þau aðeins korn í sandi.'
      - 'Leiðin heldur áfram — eða endar hér.

        Hvort sem er, hvílir hún á sömu jörð.'
    normal:
      pool:
      - 'Fjarlægðin hefur loks öðlast merkingu.

        Tíminn svaraði ferð þinni.'
      - 'Tíminn er úti.

        En ekki endar allt hér.'
      - 'Öxullinn er fundinn.

        Heimurinn hélt niðri hreyfingu sinni.'
      - 'Glerið hélt niðri í sér andanum,

        og þú stóðst föst.'
      - 'Undir kyrrum himni

        bilaði hugur þinn ekki.'
      - 'Fátt skín að eilífu.

        En þetta augnablik gerði það.'
      - 'Þú fórst yfir brothætta jörð

        án þess að missa sjóndeildarhringinn úr augsýn.'
      - 'Andartakið er liðið.

        Það sem stendur eftir, stendur áfram.'
      - 'Heppnin dofnar fljótt.

        Reglan stendur eftir.'
      - 'Himinninn þekkir enga hvíld í endalausum hring sínum,

        og þú stöðvaðist ekki heldur.'
      - 'Þú komst að miðjunni.

        Heimurinn stóð kyrr.'
      - 'Loksins ertu hér.

        Sannleikurinn stendur óhagganlegur.'
      - 'Þú fylgdir þessu til enda.

        Mundu þetta: þú valdir þessa leið. Enginn annar.'
      - 'Tíminn rann inn í þögnina

        og fann sér stað djúpt í minni þínu.'
      - 'Þegar himinninn tók nýjan lit

        rann sagan sitt skeið.'
      - 'Vötnin lægðu,

        og himinninn huldi hyldýpið á ný.'
      - 'Fótsporin þögnuðu,

        og aðeins staðurinn varð eftir.'
      - 'Ljósið féll mjúklega,

        og hver skuggi vék undan.'
      - 'Vindurinn þagnaði.

        Allt sneri aftur á sinn stað.'
      - 'Andartak þagnar.

        Heimurinn náði aftur andanum.'
      - 'Slóðin er grafin djúpt í sandinn —

        þangað sem vindurinn nær ekki lengur.'
      - 'Jafnvægið var endurheimt.

        Allt hafði leitt að þessu augnabliki.'
      - 'Hlaupi lokið.

        Skýrt. Fundið.

        Það er nóg.'
      - 'Hlaupi lokið.

        Leiðin hélt.

        Og þú líka.'
      - 'Himinninn hélt áfram sinni ferð.

        Það getur þú líka.'
      - 'Hlaupi lokið.

        Hljóðlát niðurstaða.

        Þungi raunverulegs verks.'
      - 'Þú gekkst aðeins þá leið

        sem heimurinn hafði lagt fram fyrir þig.'
      - 'Jörðin lét ekki undan.

        Hún treysti skrefum þínum.'
      - 'Þetta augnablik féll að

        fornum takti stjarnanna.'
      - 'Þú tókst ekkert.

        En þú skildir eitthvað.'
      - 'Þú vannst ekkert handa þér einum.

        Þú sást aðeins sannleikann eins og hann var.'
      - 'Þú lagðir þennan stað ekki undir þig.

        Þú tilheyrðir honum.'
      - 'Þú gekkst veg

        eldri en minningin sjálf.'
      - 'Jörðin veitti enga mótstöðu.

        Hún þekkti þig.'
      - 'Þetta augnablik féll að

        þögn stjarnanna.'
    hard:
      pool:
      - 'Í norðanáttinni

        varir skýrleikinn lengur en hraðinn.'
      - 'Miðjan fannst.

        Heimurinn mátti loks hvílast.'
      - 'Stjörnurnar þegja.

        Slóðin þín talar fyrir þig.'
      - 'Niðurstaðan stóð eftir.

        Staðan hafði breyst.'
      - 'Milli íss og glers

        valdir þú stjórn.'
      - 'Öldurnar þögnuðu,

        og hafið tók aftur við huldu dýpi sínu.'
      - 'Aðrir fjársjóðir bíða enn.

        Næst bíður önnur leið.'
      - 'Himinninn breyttist ekki.

        Það gerðir þú.'
      - 'Andartakið leið hjá.

        Eftir stóð regla.'
      - 'Veturinn er heiðarlegur.

        Hlaupið þitt var það líka.'
      - 'Stjörnurnar röðuðust saman eitt andartak.

        Þú tókst eftir því.'
      - 'Fjarlægðin lokaðist.

        Tíminn gerði það ekki.'
      - 'Reglur heimsins stóðu fastar.

        Og merki möguleikans var raunverulegt.'
      - 'Leiðin lokaðist hljóðlega.

        Þú varst þegar komin í gegn.'
      - 'Ekkert breyttist.

        Nema staða þín.'
      - 'Ekki heppni.

        Heldur samhljómur.'
      - 'Andartakið leið hjá.

        Skráin stendur eftir.'
      - 'Niðurstaðan breyttist ekki.

        Samt færðir þú þig áfram.'
      - 'Útkoman breyttist ekki.

        En þú komst á nýtt stig.'
      - 'Endirinn var sá sami.

        En sú sem náði honum hafði breyst.'
      - 'Áfangastaðurinn er hinn sami —

        en þú ert ekki lengur sami ferðalangurinn.'
      - 'Hljóðið þagnaði.

        Merkingin stóð eftir.'
      - 'Þú fórst ekki hraðast.

        Þú hélst mestri skýrleika.'
      - 'Það sem virtist frosið

        hafði aðeins beðið.'
      - 'Norðrið gaf ekkert eftir.

        Ekki þú heldur.'
      - 'Glerið brast ekki.

        Það mundi þrýstinginn.'
      - 'Leiðin bað ekki um sigur.

        Hún bað um nákvæmni.'
      - 'Þú komst með ró,

        ekki hávaða.'
      - 'Það sem stóð eftir

        var ekki heppni, heldur bygging.'
      - 'Ekki allt sem varir skín.

        Sumt stendur einfaldlega áfram.'
      - 'Í kuldanum varð formið sýnilegt.

        Þú fylgdir því.'
      - 'Þessi niðurstaða var engin tilviljun.

        Hún var lesin úr skrefunum þínum.'
  timeup:
    easy:
      pool:
      - 'Tíminn rann út.

        En leiðin man enn skrefin þín.'
      - 'Ekki náðist allt í dag.

        En eitthvað varð skýrara.'
      - 'Vindurinn tók tímann með sér.

        En ekki allt glataðist.'
      - 'Gullið beið áfram.

        Samt komst þú nær.'
      - 'Leiðin lokaðist hljóðlega.

        Hún hvarf þó ekki.'
      - 'Þú stöðvaðist ekki af eigin vilja.

        Tíminn stöðvaði þig.'
      - 'Sjóndeildarhringurinn var enn fjarlægur.

        En þú sást hann.'
      - 'Hljóðið dofnaði.

        Fótsporin stóðu eftir.'
      - 'Ekki sigur.

        En ekki tómleiki heldur.'
      - 'Það sem fannst ekki

        bíður kannski enn.'
      - 'Sandurinn tók við endinum.

        Minningin tók við leiðinni.'
      - 'Þú misstir ekki allt.

        Þú komst hingað.'
      - Sumar leiðir enda áður en þær opnast til fulls.
      - 'Þetta var ekki lokadómur.

        Aðeins lok þessa hlaups.'
      - 'Tíminn lokaði dyrunum.

        Leiðin gleymdi þér ekki.'
      - 'Reyndu aftur.

        Önnur leið gæti svarað.'
    normal:
      pool:
      - 'Tíminn rann út.

        En ferðin varð ekki að engu.'
      - 'Þú náðir ekki fjársjóðnum.

        En þú lærðir lögun leiðarinnar.'
      - 'Leiðin var lengri en stundin.

        Það gerist.'
      - 'Himinninn hélt áfram.

        Það mátt þú líka.'
      - 'Ekki hver tilraun endar með gulli.

        Sumar enda með skilningi.'
      - 'Glerið hélt birtunni.

        Jafnvel þegar tíminn brast.'
      - 'Fótsporin náðu ekki alla leið.

        Samt voru þau raunveruleg.'
      - 'Það sem lokast í dag

