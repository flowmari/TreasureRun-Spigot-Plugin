      - 'Þetta var ekki ósigur þinn.

        Aðeins hlaup sem lauk.'
      - 'Þú stóðst inni í óvissunni

        lengur en áður.'
      - 'Það sem lokaðist í dag

        getur orðið kunnuglegt á morgun.'
      - 'Tíminn vann þessa umferð.

