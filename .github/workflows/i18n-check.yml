name: i18n-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-i18n:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Compile Java
        run: ./gradlew compileJava

      - name: Check YAML syntax
        run: python3 scripts/check_i18n_yaml_syntax.py

      - name: Check required keys
        run: python3 scripts/check_i18n_required_keys.py

      - name: Check referenced keys
        run: python3 scripts/check_i18n_referenced_keys.py

      - name: Check duplicate keys
        run: python3 scripts/check_i18n_duplicate_keys.py
