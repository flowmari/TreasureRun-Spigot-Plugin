plugins {
    id 'java'
    id 'fabric-loom' version '1.3-SNAPSHOT'
}

version = project.mod_version
group = project.maven_group
base {
    archivesName = project.archives_base_name
}

repositories {
    maven { url = 'https://maven.fabricmc.net/' }
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(project.java_version as int)
    }
    withSourcesJar()
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
        resources {
            srcDirs = ['src/main/resources']
        }
    }
}

processResources {
    inputs.property "version", project.version
    filteringCharset "UTF-8"
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release = project.java_version as int
}

/*
 * TreasureRun Fabric runtime packaging
 *
 * The plain jar is the development/named jar.
 * Minecraft must receive the remapped runtime jar generated by remapJar.
 */
tasks.named('jar') {
    archiveBaseName.set(project.archives_base_name)
    archiveVersion.set(project.version.toString())
    archiveClassifier.set('dev')
    destinationDirectory.set(layout.buildDirectory.dir('devlibs'))
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from(sourceSets.main.output)
}

tasks.named('remapJar') {
    dependsOn(tasks.named('jar'))
    inputFile.set(tasks.named('jar').flatMap { it.archiveFile })
    archiveBaseName.set(project.archives_base_name)
    archiveVersion.set(project.version.toString())
    archiveClassifier.set('')
}
