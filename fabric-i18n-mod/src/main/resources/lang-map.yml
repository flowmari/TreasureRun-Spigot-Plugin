# lang-map.yml — Single Source of Truth for TreasureRun language sync
#
# Format:
#   <TreasureRun /lang code>: <Minecraft client locale code>
#
# Fabric Mod reads this file dynamically at startup.
# Add one line here to add a new serverLang -> Minecraft locale mapping.
#
# Important:
# - This file must use mappings: because TreasureRunI18nMod.java currently parses mappings.
# - resourcePackLangFile / Fabric assets must contain assets/minecraft/lang/<locale>.json.

mappings:
  ja: ja_jp
  en: en_us
  de: de_de
  fr: fr_fr
  es: es_es
  it: it_it
  sv: sv_se
  nl: nl_nl
  pt: pt_br
  ru: ru_ru
  ko: ko_kr
  zh_tw: zh_tw
  hi: hi_in
  fi: fi_fi
  is: is_is
  la: la_la
  sa: sa_in
  lzh: lzh_hant
  wmy: ojp_jp
  ojp: ojp_jp
  asl_gloss: asl_us
